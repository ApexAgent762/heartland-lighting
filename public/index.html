<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartland Permanent Lighting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--green:#1D9E75;--green-light:#EAF3DE;--green-dark:#085041;--gold:#BA7517;--gold-light:#FAEEDA;--gold-dark:#633806;--purple:#534AB7;--purple-light:#EEEDFE;--bg:#F8F7F4;--card:#FFFFFF;--border:rgba(0,0,0,0.08);--text:#1a1a1a;--muted:#888;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hidden{display:none!important;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.login-card{background:var(--card);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;border:1px solid var(--border);}
.login-logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--green-dark);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:2rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.field input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;}
.field input:focus{border-color:var(--green);}
.login-btn{width:100%;padding:13px;border-radius:10px;background:var(--green-dark);color:#fff;border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.login-btn:hover{background:var(--green);}
.login-err{font-size:13px;color:#E24B4A;margin-top:10px;text-align:center;}
#app{display:none;min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10;}
.topbar-logo{font-family:'DM Serif Display',serif;font-size:17px;color:var(--green-dark);}
.topbar-user{font-size:13px;color:var(--muted);}
.logout-btn{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.logout-btn:hover{background:var(--bg);}
.tabs-wrap{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.25rem;overflow-x:auto;white-space:nowrap;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab-btn{display:inline-block;padding:14px 16px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;}
.tab-btn.active{color:var(--green-dark);border-bottom-color:var(--green-dark);}
.content{padding:1.25rem;max-width:780px;margin:0 auto;}
.view{display:none;}
.view.active{display:block;}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:1rem;}
.section-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
.earned-hero{background:var(--green-light);border-radius:var(--radius);padding:1.5rem;text-align:center;margin-bottom:1rem;}
.earned-label{font-size:13px;font-weight:500;color:var(--green);margin-bottom:6px;}
.earned-amount{font-family:'DM Serif Display',serif;font-size:52px;color:var(--green-dark);line-height:1;}
.earned-sub{font-size:13px;color:var(--green);margin-top:8px;}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem;}
.metric{background:var(--bg);border-radius:10px;padding:.875rem 1rem;}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;}
.metric-value{font-size:22px;font-weight:600;color:var(--text);}
.metric-3{grid-template-columns:repeat(3,1fr);}
.owner-hero{background:var(--green-light);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.owner-hero-amount{font-family:'DM Serif Display',serif;font-size:36px;color:var(--green-dark);}
.emp-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.emp-item:last-child{border-bottom:none;}
.emp-name{font-size:14px;font-weight:500;}
.emp-sub{font-size:12px;color:var(--muted);}
.emp-earned-amount{font-size:16px;font-weight:600;color:var(--green-dark);}
.emp-earned-rev{font-size:11px;color:var(--muted);}
.prog-track{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;border-radius:99px;background:var(--green);transition:width .3s;}
.prog-fill.blue{background:#378ADD;}
.form-row{display:grid;gap:8px;margin-bottom:10px;}
.form-row.cols2{grid-template-columns:1fr 1fr;}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr;}
.form-row.cols4{grid-template-columns:1fr 1fr 1fr auto;}
input,select,textarea{padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);width:100%;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--green);}
textarea{resize:vertical;min-height:80px;}
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn-green{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}
.btn-green:hover{background:var(--green);border-color:var(--green);}
.btn-sm{padding:6px 12px;font-size:13px;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:0 4px;}
.del-btn:hover{color:#E24B4A;}
.post-card{border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px;border:1px solid var(--border);background:var(--card);}
.post-card.quote{background:var(--gold-light);border-color:var(--gold);border-left:3px solid var(--gold);border-radius:0 var(--radius) var(--radius) 0;}
.post-card.pinned{border-left:3px solid var(--purple);border-radius:0 var(--radius) var(--radius) 0;}
.quote-text{font-family:'DM Serif Display',serif;font-size:17px;color:var(--gold-dark);line-height:1.5;margin-bottom:6px;font-style:italic;}
.quote-author{font-size:12px;color:var(--gold);font-weight:500;}
.post-body{font-size:14px;line-height:1.6;margin-bottom:6px;}
.post-meta{font-size:11px;color:var(--muted);}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:6px;vertical-align:middle;}
.badge-pin{background:var(--purple-light);color:var(--purple);}
.badge-goal{background:var(--gold-light);color:var(--gold-dark);}
.badge-achieved{background:var(--green-light);color:var(--green-dark);}
.goal-card{border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:10px;background:var(--card);}
.goal-card.achieved{border-color:var(--green);background:var(--green-light);}
.sales-table{width:100%;font-size:13px;border-collapse:collapse;}
.sales-table th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--border);}
.sales-table td{padding:10px 8px;border-bottom:1px solid var(--border);}
.sales-table tr:last-child td{border-bottom:none;}
.type-toggle{display:flex;gap:6px;margin-bottom:12px;}
.type-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;}
.type-btn.active{background:var(--green-light);color:var(--green-dark);border-color:var(--green);}
.type-btn.quote-t.active{background:var(--gold-light);color:var(--gold-dark);border-color:var(--gold);}
@media(max-width:480px){.form-row.cols3,.form-row.cols4{grid-template-columns:1fr 1fr;}.owner-hero{flex-direction:column;gap:8px;text-align:center;}.metric-3{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="login-screen">
<div class="login-card">
<div class="login-logo">Heartland Permanent Lighting</div>
<div class="login-sub">Sign in to your dashboard</div>
<div class="field"><label>Username</label><input type="text" id="l-user" placeholder="Enter username" autocomplete="username"></div>
<div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="Enter password" autocomplete="current-password"></div>
<button class="login-btn" onclick="doLogin()">Sign in</button>
<div class="login-err hidden" id="l-err">Invalid username or password</div>
</div>
</div>
<div id="app">
<div class="topbar">
<div class="topbar-logo">Heartland</div>
<div style="display:flex;align-items:center;gap:12px;">
<span class="topbar-user" id="topbar-name"></span>
<button class="logout-btn" onclick="doLogout()">Sign out</button>
</div>
</div>
<div class="tabs-wrap" id="tabs-wrap"></div>
<div class="content" id="content"></div>
</div>
<script>
let currentUser=null;
async function api(method,path,body){const res=await fetch(path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined,credentials:'include'});return res.json();}
async function doLogin(){const username=document.getElementById('l-user').value.trim();const password=document.getElementById('l-pass').value.trim();const err=document.getElementById('l-err');err.classList.add('hidden');const res=await api('POST','/api/login',{username,password});if(res.error){err.classList.remove('hidden');return;}currentUser=res;showApp();}
async function doLogout(){await api('POST','/api/logout');currentUser=null;document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';}
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function fmt(n){return'$'+Math.round(n).toLocaleString();}
function pct(a,b){return b>0?Math.min(100,Math.round((a/b)*100)):0;}
function ini(name){return name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';document.getElementById('topbar-name').textContent=currentUser.name;if(currentUser.role==='owner')renderOwnerApp();else if(currentUser.role==='secretary')renderSecretaryApp();else renderEmployeeApp();}
function setupTabs(tabs,def){const wrap=document.getElementById('tabs-wrap');const content=document.getElementById('content');wrap.innerHTML=tabs.map(t=>`<button class="tab-btn ${t.id===def?'active':''}" onclick="switchTab('${t.id}',this)">${t.label}</button>`).join('');content.innerHTML=tabs.map(t=>`<div class="view ${t.id===def?'active':''}" id="${t.id}"></div>`).join('');}
function switchTab(id,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));btn.classList.add('active');document.getElementById(id).classList.add('active');}
function postHTML(p,canDelete){if(p.type==='quote'){return`<div class="post-card quote"><div class="quote-text">"${p.body}"</div><div class="quote-author">— ${p.author}</div><div style="display:flex;justify-content:space-between;margin-top:8px;"><div style="font-size:11px;color:var(--gold);">Weekly quote · ${p.date}</div>${canDelete?`<button class="del-btn" onclick="deletePost(${p.id})">×</button>`:''}</div></div>`;}return`<div class="post-card ${p.pin?'pinned':''}"><div style="display:flex;justify-content:space-between;margin-bottom:6px;"><div style="font-size:12px;font-weight:500;">To: ${p.target}${p.pin?'<span class="badge badge-pin">Pinned</span>':''}</div>${canDelete?`<button class="del-btn" onclick="deletePost(${p.id})">×</button>`:''}</div><div class="post-body">${p.body}</div><div class="post-meta">${p.date}</div></div>`;}
async function renderEmployeeApp(){const data=await api('GET','/api/my-stats');setupTabs([{id:'my-dash',label:'My dashboard'},{id:'board',label:'Team board'}],'my-dash');const goal=data.goal;const p=goal?pct(data.revenue,goal.target):0;const achieved=goal&&data.revenue>=goal.target;document.getElementById('my-dash').innerHTML=`<div class="earned-hero"><div class="earned-label">Your total earned</div><div class="earned-amount">${fmt(data.earned)}</div><div class="earned-sub">${data.installs} install${data.installs!==1?'s':''} · ${data.rate}% commission rate</div></div><div class="metrics"><div class="metric"><div class="metric-label">Revenue generated</div><div class="metric-value">${fmt(data.revenue)}</div></div><div class="metric"><div class="metric-label">Installs completed</div><div class="metric-value">${data.installs}</div></div></div>${goal?`<div class="goal-card ${achieved?'achieved':''}"><div class="section-label">Your goal</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div><div style="font-size:15px;font-weight:500;">${goal.prize}</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">${achieved?'You did it!':'Keep going — you\'re '+p+'% there'}</div></div><span class="badge ${achieved?'badge-achieved':'badge-goal'}">${achieved?'Achieved':p+'%'}</span></div><div class="prog-track"><div class="prog-fill ${achieved?'':'blue'}" style="width:${p}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--muted);"><span>Current: ${fmt(data.revenue)}</span><span>${achieved?'Goal unlocked!':'Need '+fmt(Math.max(0,goal.target-data.revenue))+' more'}</span><span>Target: ${fmt(goal.target)}</span></div></div>`:''} ${data.sales.length>0?`<div class="card"><div class="section-label">Recent sales</div><table class="sales-table"><tr><th>Date</th><th>Address</th><th>Amount</th><th>Earned</th></tr>${data.sales.map(s=>`<tr><td>${s.date}</td><td>${s.address||'—'}</td><td>${fmt(s.amount)}</td><td style="color:var(--green-dark);font-weight:500;">${fmt(s.amount*data.rate/100)}</td></tr>`).join('')}</table></div>`:''}`;
document.getElementById('board').innerHTML=data.posts.length===0?'<div class="card" style="color:var(--muted);font-size:14px;">No posts yet.</div>':data.posts.map(p=>postHTML(p,false)).join('');}
async function renderOwnerApp(){setupTabs([{id:'overview',label:'Overview'},{id:'team',label:'Team'},{id:'goals',label:'Goals'},{id:'board-owner',label:'Team board'},{id:'log-sale',label:'Log sale'},{id:'manage',label:'Manage'}],'overview');await refreshOwner();}
async function refreshOwner(){const[empData,goals,posts]=await Promise.all([api('GET','/api/employees'),api('GET','/api/goals'),api('GET','/api/posts')]);renderOverview(empData,goals);renderTeam(empData,goals);renderGoals(empData,goals);renderBoard(posts);renderLogSale(empData);renderManage(empData);}
function renderOverview(empData,goals){const{employees,ownerSales}=empData;const totalRev=employees.reduce((s,e)=>s+e.revenue,0)+ownerSales.revenue;const totalComm=employees.reduce((s,e)=>s+e.earned,0);const totalInst=employees.reduce((s,e)=>s+e.installs,0)+ownerSales.installs;const ownerEarnings=ownerSales.revenue+employees.reduce((s,e)=>s+(e.revenue-e.earned),0);document.getElementById('overview').innerHTML=`<div class="owner-hero"><div><div style="font-size:13px;color:var(--green);font-weight:500;">Your total earnings</div><div style="font-size:12px;color:var(--green);margin-top:2px;">your sales + share after paying commissions</div></div><div class="owner-hero-amount">${fmt(ownerEarnings)}</div></div><div class="metrics metric-3"><div class="metric"><div class="metric-label">Total revenue</div><div class="metric-value">${fmt(totalRev)}</div></div><div class="metric"><div class="metric-label">Paid in commissions</div><div class="metric-value">${fmt(totalComm)}</div></div><div class="metric"><div class="metric-label">Total installs</div><div class="metric-value">${totalInst}</div></div></div><div class="card"><div class="section-label">Breakdown</div>${[...employees].sort((a,b)=>b.revenue-a.revenue).map(e=>`<div class="emp-item"><div class="avatar" style="width:36px;height:36px;font-size:11px;background:${e.color};color:${e.tc}">${ini(e.name)}</div><div style="flex:1;"><div class="emp-name">${e.name}</div><div class="emp-sub">${e.installs} installs · ${e.rate}%</div></div><div style="text-align:right;"><div class="emp-earned-amount">${fmt(e.earned)}</div><div class="emp-earned-rev">${fmt(e.revenue)} rev · ${fmt(e.revenue-e.earned)} your share</div></div></div>`).join('')}${ownerSales.revenue>0?`<div class="emp-item" style="background:rgba(234,243,222,0.4);border-radius:8px;padding:12px 8px;"><div class="avatar" style="width:36px;height:36px;font-size:11px;background:#EAF3DE;color:#27500A">ME</div><div style="flex:1;"><div class="emp-name" style="color:var(--green-dark)">You (owner)</div><div class="emp-sub">${ownerSales.installs} installs · 100%</div></div><div style="text-align:right;"><div class="emp-earned-amount">${fmt(ownerSales.revenue)}</div><div class="emp-earned-rev">100% kept</div></div></div>`:''}</div>`;}
function renderTeam(empData,goals){document.getElementById('team').innerHTML=[...empData.employees].sort((a,b)=>b.revenue-a.revenue).map((e,i)=>{const goal=goals.find(g=>g.userId===e.id);const p=goal?pct(e.revenue,goal.target):0;const achieved=goal&&e.revenue>=goal.target;return`<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;"><div style="font-size:12px;font-weight:600;color:var(--muted);width:20px;">#${i+1}</div><div class="avatar" style="width:40px;height:40px;font-size:12px;background:${e.color};color:${e.tc}">${ini(e.name)}</div><div style="flex:1;"><div style="font-size:15px;font-weight:500;">${e.name}</div><div style="font-size:12px;color:var(--muted);">${e.installs} installs · ${e.rate}% rate</div></div></div><div style="background:var(--green-light);border-radius:10px;padding:1rem;text-align:center;margin-bottom:10px;"><div style="font-size:12px;color:var(--green);font-weight:500;margin-bottom:4px;">Total earned</div><div style="font-family:'DM Serif Display',serif;font-size:36px;color:var(--green-dark);">${fmt(e.earned)}</div><div style="font-size:12px;color:var(--green);margin-top:4px;">from ${fmt(e.revenue)} in revenue</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><div class="metric"><div class="metric-label">Your share</div><div class="metric-value" style="font-size:18px;">${fmt(e.revenue-e.earned)}</div></div><div class="metric"><div class="metric-label">Installs</div><div class="metric-value" style="font-size:18px;">${e.installs}</div></div></div>${goal?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><div style="font-size:13px;font-weight:500;">Goal: ${goal.prize}</div><span class="badge ${achieved?'badge-achieved':'badge-goal'}">${achieved?'Achieved!':p+'%'}</span></div><div class="prog-track"><div class="prog-fill ${achieved?'':'blue'}" style="width:${p}%"></div></div><div style="font-size:11px;color:var(--muted);margin-top:4px;">${achieved?'Goal unlocked!':'Needs '+fmt(Math.max(0,goal.target-e.revenue))+' more'}</div></div>`:''}</div>`;}).join('');}
function renderGoals(empData,goals){const empOptions=empData.employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');document.getElementById('goals').innerHTML=`<div class="card"><div class="section-label">Set a goal</div><div class="form-row cols4"><select id="g-emp">${empOptions}</select><input type="number" id="g-target" placeholder="Target $"><input type="text" id="g-prize" placeholder="Prize (e.g. $500 cash)"><button class="btn btn-green" onclick="addGoal()">+ Set</button></div></div>${goals.length===0?'<div style="font-size:14px;color:var(--muted);padding:.5rem 0;">No goals set yet.</div>':goals.map(g=>{const e=empData.employees.find(x=>x.id===g.userId);if(!e)return'';const p=pct(e.revenue,g.target);const achieved=e.revenue>=g.target;return`<div class="goal-card ${achieved?'achieved':''}"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div class="avatar" style="width:32px;height:32px;font-size:11px;background:${e.color};color:${e.tc}">${ini(e.name)}</div><div style="flex:1;"><div style="font-size:14px;font-weight:500;">${e.name}</div><span class="badge ${achieved?'badge-achieved':'badge-goal'}">${achieved?'Achieved: ':'Prize: '}${g.prize}</span></div><div style="text-align:right;font-size:13px;font-weight:500;">${fmt(e.revenue)} / ${fmt(g.target)}</div><button class="del-btn" onclick="deleteGoal(${g.id})">×</button></div><div class="prog-track" style="height:10px;"><div class="prog-fill ${achieved?'':'blue'}" style="width:${p}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted);"><span>Current: ${fmt(e.revenue)}</span><span style="color:${achieved?'var(--green)':'var(--muted)'};">${achieved?'Unlocked!':'Need '+fmt(Math.max(0,g.target-e.revenue))+' more'}</span><span>Target: ${fmt(g.target)}</span></div></div>`;}).join('')}`;}

/div></div></div>`).join('')}</div>`;}

window.qCalc = function(){
  const ft=parseFloat(document.getElementById('qa-ft').value)||0;
  const ppf=parseFloat(document.getElementById('qa-ppf').value)||0;
  const disc=parseFloat(document.getElementById('qa-disc').value)||0;
  const orig=ft*ppf;
  const final=Math.max(0,orig-disc);
  document.getElementById('qc-orig').textContent='$'+Math.round(orig).toLocaleString();
  document.getElementById('qc-final').textContent='$'+Math.round(final).toLocaleString();
  document.getElementById('qc-disc').textContent='$'+Math.round(disc).toLocaleString();
};

window.qGenerate = function(){
  const addr=document.getElementById('qa-addr').value.trim();
  const bld=document.getElementById('qa-bld').value.trim();
  const ft=parseFloat(document.getElementById('qa-ft').value)||0;
  const ppf=parseFloat(document.getElementById('qa-ppf').value)||0;
  const disc=parseFloat(document.getElementById('qa-disc').value)||0;
  if(!addr||!ft||!ppf){alert('Please fill in address, footage, and price per foot.');return;}
  const orig=ft*ppf;
  const final=Math.max(0,orig-disc);
  const fmt=n=>'$'+Math.round(n).toLocaleString();
  document.getElementById('qr-addr').textContent=addr;
  document.getElementById('qr-bld').textContent=bld||'Residential';
  document.getElementById('qr-ft').textContent=ft+' ft';
  const priceEl=document.getElementById('qr-price');
  priceEl.innerHTML=disc>0?`<span class="price-struck">${fmt(orig)}</span> → <span class="price-green">${fmt(final)}</span>`:`<span class="price-green">${fmt(final)}</span>`;
  document.getElementById('qr-comp-ft').textContent='Based on '+ft+' ft installation';
  document.getElementById('qr-hl-price').textContent=fmt(final);
  const comps=[
    {name:'Trimlight System',low:18,high:35},
    {name:'JellyFish Lighting',low:25,high:35},
    {name:'Astoria Lighting Co.',low:20,high:28},
    {name:'Leading Edge / Small installers',low:17,high:22},
  ];
  document.getElementById('qr-comp-list').innerHTML=comps.map(c=>`<div class="q-comp-item"><div class="q-comp-name">${c.name}</div><div class="q-comp-price">${fmt(Math.round(c.low*ft))} – ${fmt(Math.round(c.high*ft))}</div></div>`).join('');
  const savings=Math.round(17*ft)-final;
  document.getElementById('qr-save-note').textContent=savings>0?'Save up to '+fmt(savings)+' compared to competitors':'Professional installation at an unbeatable price';
  document.getElementById('qform').style.display='none';
  document.getElementById('qdoc-wrap').style.display='block';
};

          <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:${e.color};color:${e.tc};flex-shrink:0;">${ini(e.name)}</div>
          <div style="flex:1;"><div style="font-size:14px;font-weight:500;">${e.name}</div><div style="font-size:12px;color:#888;">${e.installs} installs · ${e.rate}%</div></div>
          <div style="text-align:right;"><div style="font-size:16px;font-weight:600;color:#085041;">${fmt(e.earned)}</div><div style="font-size:11px;color:#888;">${fmt(e.revenue)} rev</div></div>
        </div>`).join('')}
    </div>`;

  // Summary
  const summary = await api('GET', '/api/summary');
  const unpaidCount = summary.unpaidCount || 0;
  const unpaidTotal = summary.unpaidTotal || 0;
  document.getElementById('sec-summary').innerHTML = `
    ${unpaidCount > 0 ? `<div style="background:#FAEEDA;border-radius:10px;padding:12px 1rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;border-left:3px solid #BA7517;"><div><div style="font-size:13px;color:#633806;font-weight:500;">Commissions to pay out</div><div style="font-size:11px;color:#854F0B;margin-top:2px;">${unpaidCount} sale${unpaidCount!==1?'s':''} not yet marked paid</div></div><div style="font-size:18px;font-weight:600;color:#633806;">${fmt(unpaidTotal*0.4)}</div></div>` : `<div style="background:#EAF3DE;border-radius:10px;padding:12px 1rem;margin-bottom:1rem;font-size:13px;color:#085041;font-weight:500;">All commissions paid up to date</div>`}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;">
      <div style="background:#F8F7F4;border-radius:10px;padding:.875rem 1rem;"><div style="font-size:11px;color:#888;margin-bottom:4px;font-weight:500;">Today's revenue</div><div style="font-size:22px;font-weight:600;">${fmt(summary.todayRev)}</div><div style="font-size:11px;color:#888;margin-top:3px;">${summary.todaySales} sale${summary.todaySales!==1?'s':''} today</div></div>
      <div style="background:#F8F7F4;border-radius:10px;padding:.875rem 1rem;"><div style="font-size:11px;color:#888;margin-bottom:4px;font-weight:500;">This week's revenue</div><div style="font-size:22px;font-weight:600;">${fmt(summary.weekRev)}</div><div style="font-size:11px;color:#888;margin-top:3px;">${summary.weekSales} sale${summary.weekSales!==1?'s':''} this week</div></div>
    </div>
    ${summary.topPerformer ? `<div style="background:#EAF3DE;border-radius:10px;padding:12px 1rem;display:flex;align-items:center;justify-content:space-between;border-left:3px solid #1D9E75;"><div><div style="font-size:13px;color:#085041;font-weight:500;">Top performer</div><div style="font-size:16px;font-weight:600;color:#085041;">${summary.topPerformer.name}</div></div><div style="font-size:16px;font-weight:600;color:#085041;">${fmt(summary.topPerformer.revenue)}</div></div>` : ''}`;

  // Team
  document.getElementById('sec-team').innerHTML = `
    <div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:14px;padding:1.25rem;">
      ${[...employees].sort((a,b)=>b.revenue-a.revenue).map((e,i)=>`
        <div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:14px;padding:1.25rem;margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <div style="font-size:12px;font-weight:600;color:#888;width:20px;">#${i+1}</div>
            <div style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:${e.color};color:${e.tc};">${ini(e.name)}</div>
            <div style="flex:1;"><div style="font-size:15px;font-weight:500;">${e.name}</div><div style="font-size:12px;color:#888;">${e.installs} installs · ${e.rate}%</div></div>
          </div>
          <div style="background:#EAF3DE;border-radius:10px;padding:1rem;text-align:center;margin-bottom:10px;">
            <div style="font-size:12px;color:#1D9E75;font-weight:500;margin-bottom:4px;">Total earned</div>
            <div style="font-family:'DM Serif Display',serif;font-size:32px;color:#085041;">${fmt(e.earned)}</div>
            <div style="font-size:12px;color:#1D9E75;margin-top:4px;">from ${fmt(e.revenue)} in revenue</div>
          </div>
        </div>`).join('')}
    </div>`;

  // Goals
  const statusColors = {new:{bg:'#FAEEDA',color:'#633806',label:'New'},ordered:{bg:'#E6F1FB',color:'#0C447C',label:'Lights ordered'},scheduled:{bg:'#EEEDFE',color:'#3C3489',label:'Scheduled'},installed:{bg:'#EAF3DE',color:'#085041',label:'Installed'}};
  document.getElementById('sec-goals').innerHTML = goals.length === 0 ? '<div style="font-size:14px;color:#888;">No goals set yet.</div>' :
    goals.map(g => {
      const e = employees.find(x=>x.id===g.userId);
      if(!e) return '';
      const p = e.revenue > 0 ? Math.min(100, Math.round((e.revenue/g.target)*100)) : 0;
      const achieved = e.revenue >= g.target;
      return `<div style="background:#fff;border:1px solid ${achieved?'#1D9E75':'rgba(0,0,0,0.08)'};border-radius:14px;padding:1.25rem;margin-bottom:10px;${achieved?'background:#EAF3DE;':''}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:${e.color};color:${e.tc};">${ini(e.name)}</div>
          <div style="flex:1;"><div style="font-size:14px;font-weight:500;">${e.name}</div><span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${achieved?'#EAF3DE':'#FAEEDA'};color:${achieved?'#085041':'#633806'};font-weight:600;">${achieved?'Achieved: ':'Prize: '}${g.prize}</span></div>
          <div style="font-size:13px;font-weight:500;">${fmt(e.revenue)} / ${fmt(g.target)}</div>
        </div>
        <div style="height:10px;background:#F8F7F4;border-radius:99px;overflow:hidden;"><div style="height:100%;border-radius:99px;background:${achieved?'#1D9E75':'#378ADD'};width:${p}%"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#888;"><span>Current: ${fmt(e.revenue)}</span><span style="color:${achieved?'#1D9E75':'#888'};">${achieved?'Unlocked!':'Need '+fmt(Math.max(0,g.target-e.revenue))+' more'}</span><span>Target: ${fmt(g.target)}</span></div>
      </div>`;
    }).join('');

  // Quotes
  const newQ = quotes.filter(q=>q.status==='new');
  const otherQ = quotes.filter(q=>q.status!=='new');
  document.getElementById('sec-quotes').innerHTML = quotes.length === 0 ? '<div style="font-size:14px;color:#888;">No quotes submitted yet.</div>' : `
    ${newQ.length>0?`<div style="font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;">New (${newQ.length})</div>${newQ.map(q=>{const s=statusColors[q.status]||statusColors.new;return`<div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:14px;padding:1.25rem;margin-bottom:10px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><div><div style="font-size:15px;font-weight:600;">${q.address}</div><div style="font-size:12px;color:#888;">${q.employeeName} · ${q.date} · ${q.footage}ft</div></div><div style="text-align:right;"><div style="font-size:18px;font-weight:600;color:#085041;">${fmt(q.finalPrice)}</div><span style="font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;background:${s.bg};color:${s.color};">${s.label}</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;"><select onchange="secUpdateStatus(${q.id},this.value)" style="padding:7px 10px;border-radius:8px;border:1px solid rgba(0,0,0,0.12);background:#F8F7F4;font-size:13px;font-family:'DM Sans',sans-serif;">${Object.entries(statusColors).map(([k,v])=>`<option value="${k}" ${q.status===k?'selected':''}>${v.label}</option>`).join('')}</select><button onclick="secDeleteQuote(${q.id})" style="padding:7px;border-radius:8px;border:1px solid #E24B4A;background:transparent;color:#E24B4A;font-size:13px;cursor:pointer;">Remove</button></div><textarea placeholder="Notes..." onchange="secUpdateNotes(${q.id},this.value)" style="width:100%;padding:8px;border-radius:8px;border:1px solid rgba(0,0,0,0.12);background:#F8F7F4;font-size:13px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:55px;">${q.notes||''}</textarea></div>`;}).join('')}`:''}
    ${otherQ.length>0?`<div style="font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase;margin:12px 0 8px;">In progress / completed</div>${otherQ.map(q=>{const s=statusColors[q.status]||statusColors.new;return`<div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:14px;padding:1.25rem;margin-bottom:10px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><div><div style="font-size:15px;font-weight:600;">${q.address}</div><div style="font-size:12px;color:#888;">${q.employeeName} · ${q.date} · ${q.footage}ft</div></div><div style="text-align:right;"><div style="font-size:18px;font-weight:600;color:#085041;">${fmt(q.finalPrice)}</div><span style="font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;background:${s.bg};color:${s.color};">${s.label}</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;"><select onchange="secUpdateStatus(${q.id},this.value)" style="padding:7px 10px;border-radius:8px;border:1px solid rgba(0,0,0,0.12);background:#F8F7F4;font-size:13px;font-family:'DM Sans',sans-serif;">${Object.entries(statusColors).map(([k,v])=>`<option value="${k}" ${q.status===k?'selected':''}>${v.label}</option>`).join('')}</select><button onclick="secDeleteQuote(${q.id})" style="padding:7px;border-radius:8px;border:1px solid #E24B4A;background:transparent;color:#E24B4A;font-size:13px;cursor:pointer;">Remove</button></div><textarea placeholder="Notes..." onchange="secUpdateNotes(${q.id},this.value)" style="width:100%;padding:8px;border-radius:8px;border:1px solid rgba(0,0,0,0.12);background:#F8F7F4;font-size:13px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:55px;">${q.notes||''}</textarea></div>`;}).join('')}`:''}`;

  // Pay tracker
  const salesRes = await fetch('/api/all-sales', {credentials:'include'});
  const sales = salesRes.ok ? await salesRes.json() : [];
  document.getElementById('sec-payments').innerHTML = sales.length === 0 ? '<div style="font-size:14px;color:#888;">No sales logged yet.</div>' : `
    <div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:14px;padding:1.25rem;">
      ${sales.map(s => {
        const emp = employees.find(e=>e.id===s.userId);
        if(!emp) return '';
        const comm = s.amount*(emp.rate/100);
        return `<div style="display:grid;grid-template-columns:1fr 70px 70px 90px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);${s.paid?'opacity:0.5':''}">
          <div><div style="font-size:13px;font-weight:500;">${emp.name}</div><div style="font-size:11px;color:#888;">${s.address||s.date}</div></div>
          <div style="font-size:13px;">${fmt(s.amount)}</div>
          <div style="font-size:13px;color:#085041;font-weight:500;">${fmt(comm)}</div>
          <button onclick="secTogglePaid(${s.id},${!s.paid})" style="padding:5px 10px;border-radius:6px;border:1px solid;font-size:11px;font-weight:500;cursor:pointer;background:${s.paid?'transparent':'#085041'};color:${s.paid?'#888':'#fff'};border-color:${s.paid?'rgba(0,0,0,0.12)':'#085041'};">${s.paid?'Paid':'Mark paid'}</button>
        </div>`;
      }).join('')}
    </div>`;

  // Board
  document.getElementById('sec-board').innerHTML = posts.length === 0 ? '<div style="font-size:14px;color:#888;">No posts yet.</div>' :
    [...posts].sort((a,b)=>(b.pin?1:0)-(a.pin?1:0)).map(p => {
      if(p.type==='quote') return `<div style="background:#FAEEDA;border-left:3px solid #BA7517;border-radius:0 14px 14px 0;padding:1rem 1.25rem;margin-bottom:10px;"><div style="font-family:'DM Serif Display',serif;font-size:16px;color:#633806;font-style:italic;margin-bottom:5px;">"${p.body}"</div><div style="font-size:12px;color:#BA7517;font-weight:500;">— ${p.author} · ${p.date}</div></div>`;
      return `<div style="background:#fff;border:1px solid rgba(0,0,0,0.08);${p.pin?'border-left:3px solid #534AB7;border-radius:0 14px 14px 0;':'border-radius:14px;'}padding:1rem 1.25rem;margin-bottom:10px;"><div style="font-size:12px;font-weight:500;margin-bottom:5px;">To: ${p.target}${p.pin?'<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:#EEEDFE;color:#534AB7;font-weight:600;margin-left:6px;">Pinned</span>':''}</div><div style="font-size:14px;line-height:1.6;margin-bottom:5px;">${p.body}</div><div style="font-size:11px;color:#888;">${p.date}</div></div>`;
    }).join('');
};

window.secUpdateStatus = async function(id, status){
  await api('PATCH', '/api/quotes/'+id, {status});
};
window.secUpdateNotes = async function(id, notes){
  await api('PATCH', '/api/quotes/'+id, {notes});
};
window.secDeleteQuote = async function(id){
  await api('DELETE', '/api/quotes/'+id);
  window.renderSecretaryApp();
};
window.secTogglePaid = async function(id, paid){
  await api('PATCH', '/api/sales/'+id+'/paid', {paid});
  window.renderSecretaryApp();
};

})();
</script>
<script>
(function(){

function buildCalendar(sales, rate, containerId, showAll, employees){
  const el = document.getElementById(containerId);
  if(!el) return;
  const fmt = n => '$'+Math.round(n).toLocaleString();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const empColors = ['#1D9E75','#378ADD','#534AB7','#BA7517','#D85A30','#D4537E','#639922','#888780','#E24B4A'];

  let weekOffset = 0;

  function dateStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

  function getWeekDates(offset){
    const now = new Date();
    const day = now.getDay();
    const start = new Date(now);
    start.setDate(now.getDate() - day + (offset*7));
    return Array.from({length:7},(_,i)=>{ const d=new Date(start); d.setDate(start.getDate()+i); return d; });
  }

  function render(){
    const dates = getWeekDates(weekOffset);
    const todayStr = dateStr(new Date());
    const startLabel = months[dates[0].getMonth()]+' '+dates[0].getDate();
    const endLabel = months[dates[6].getMonth()]+' '+dates[6].getDate()+', '+dates[6].getFullYear();

    let weekSales = sales.filter(s => {
      const d = new Date(s.date+'T12:00:00');
      return dates.some(wd => dateStr(wd) === dateStr(d));
    });

    const weekEarned = weekSales.reduce((sum,s) => {
      if(showAll && employees){
        const emp = employees.find(e=>e.id===s.userId);
        return sum + (emp ? s.amount*(emp.rate/100) : 0);
      }
      return sum + s.amount*(rate/100);
    }, 0);
    const weekRev = weekSales.reduce((sum,s)=>sum+s.amount,0);

    el.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <button onclick="window._calNav_${containerId}(-1)" style="background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--text,#1a1a1a);font-family:'DM Sans',sans-serif;">← Prev</button>
        <div style="font-size:14px;font-weight:500;color:var(--text,#1a1a1a);">${startLabel} – ${endLabel}</div>
        <button onclick="window._calNav_${containerId}(1)" style="background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--text,#1a1a1a);font-family:'DM Sans',sans-serif;">Next →</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;">
        <div style="background:var(--bg,#F8F7F4);border-radius:10px;padding:.875rem 1rem;"><div style="font-size:11px;color:var(--muted,#888);margin-bottom:4px;font-weight:500;">${showAll?'Week revenue':'Week earned'}</div><div style="font-size:22px;font-weight:600;color:var(--text,#1a1a1a);">${showAll?fmt(weekRev):fmt(weekEarned)}</div></div>
        <div style="background:var(--bg,#F8F7F4);border-radius:10px;padding:.875rem 1rem;"><div style="font-size:11px;color:var(--muted,#888);margin-bottom:4px;font-weight:500;">Jobs this week</div><div style="font-size:22px;font-weight:600;color:var(--text,#1a1a1a);">${weekSales.length}</div></div>
        <div style="background:var(--bg,#F8F7F4);border-radius:10px;padding:.875rem 1rem;"><div style="font-size:11px;color:var(--muted,#888);margin-bottom:4px;font-weight:500;">Avg per job</div><div style="font-size:22px;font-weight:600;color:var(--text,#1a1a1a);">${weekSales.length>0?fmt((showAll?weekRev:weekEarned)/weekSales.length):'$0'}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem;">
        ${days.map(d=>`<div style="text-align:center;font-size:10px;font-weight:600;color:var(--muted,#888);padding:4px 0;text-transform:uppercase;letter-spacing:.04em;">${d}</div>`).join('')}
        ${dates.map(d => {
          const ds = dateStr(d);
          const dayJobs = sales.filter(s => dateStr(new Date(s.date+'T12:00:00')) === ds);
          const isToday = ds === todayStr;
          const hasJob = dayJobs.length > 0;
          const dots = showAll && employees ? dayJobs.map((j,i) => {
            const emp = employees.find(e=>e.id===j.userId);
            const color = emp ? empColors[employees.indexOf(emp) % empColors.length] : '#1D9E75';
            return `<div style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block;margin:1px;"></div>`;
          }).join('') : (hasJob ? `<div style="background:#EAF3DE;border-radius:4px;padding:2px 4px;font-size:10px;color:#085041;font-weight:600;margin-bottom:2px;">${dayJobs.length} job${dayJobs.length>1?'s':''}</div><div style="font-size:10px;color:#3B6D11;font-weight:500;">${fmt(dayJobs.reduce((s,j)=>s+j.amount*(rate/100),0))}</div>` : '');
          return `<div style="background:${hasJob?'#EAF3DE':'var(--card,#fff)'};border:${isToday?'1.5px solid #1D9E75':'0.5px solid rgba(0,0,0,0.08)'};border-radius:8px;padding:6px;min-height:64px;">
            <div style="font-size:12px;font-weight:${isToday?'700':'500'};color:${isToday?'#085041':'var(--muted,#888)'};margin-bottom:4px;">${d.getDate()}</div>
            ${dots}
          </div>`;
        }).join('')}
      </div>
      ${weekSales.length > 0 ? `
      <div style="background:var(--card,#fff);border:0.5px solid rgba(0,0,0,0.08);border-radius:12px;padding:1rem 1.25rem;">
        <div style="font-size:11px;font-weight:600;color:var(--muted,#888);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;">Jobs this week</div>
        ${weekSales.map(s => {
          const emp = showAll && employees ? employees.find(e=>e.id===s.userId) : null;
          const earned = emp ? s.amount*(emp.rate/100) : s.amount*(rate/100);
          const color = emp ? empColors[employees.indexOf(emp)%empColors.length] : '#1D9E75';
          const d = new Date(s.date+'T12:00:00');
          return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid rgba(0,0,0,0.06);">
            ${showAll?`<div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;"></div>`:''}
            <div style="font-size:12px;color:var(--muted,#888);width:${showAll?'auto':'60px'};">${days[d.getDay()]} ${d.getDate()}${showAll?'':''}</div>
            ${emp?`<div style="font-size:12px;font-weight:500;color:var(--text,#1a1a1a);flex:1;">${emp.name}</div>`:''}
            <div style="font-size:13px;color:var(--text,#1a1a1a);flex:${showAll?0:1};">${s.address||'—'}</div>
            <div style="font-size:13px;font-weight:600;color:#085041;">${fmt(showAll?s.amount:earned)}</div>
          </div>`;
        }).join('')}
      </div>` : '<div style="text-align:center;font-size:13px;color:var(--muted,#888);padding:1rem 0;">No jobs this week</div>'}
    `;
  }

  window[`_calNav_${containerId}`] = function(dir){ weekOffset+=dir; render(); };
  render();
}

// Inject into employee dashboard
const _renderEmployeeApp = window.renderEmployeeApp;
window.renderEmployeeApp = async function(){
  await _renderEmployeeApp();
  const data = await fetch('/api/my-stats', {credentials:'include'}).then(r=>r.json());
  const myDash = document.getElementById('my-dash');
  if(!myDash) return;
  const calDiv = document.createElement('div');
  calDiv.id = 'emp-calendar';
  calDiv.style.cssText = 'margin-top:1rem;background:var(--card,#fff);border:0.5px solid rgba(0,0,0,0.08);border-radius:14px;padding:1.25rem;';
  const title = document.createElement('div');
  title.style.cssText = 'font-size:11px;font-weight:600;color:var(--muted,#888);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;';
  title.textContent = 'Job calendar';
  calDiv.appendChild(title);
  const inner = document.createElement('div');
  inner.id = 'emp-cal-inner';
  calDiv.appendChild(inner);
  myDash.appendChild(calDiv);
  buildCalendar(data.sales||[], data.rate, 'emp-cal-inner', false, null);
};

// Inject into owner overview
const _renderOverview = window.renderOverview;
window.renderOverview = function(empData, goals){
  _renderOverview(empData, goals);
  setTimeout(async () => {
    const overviewEl = document.getElementById('overview');
    if(!overviewEl) return;
    const salesRes = await fetch('/api/all-sales', {credentials:'include'});
    const allSales = salesRes.ok ? await salesRes.json() : [];

<script>
(function(){
const _renderEmployeeApp = window.renderEmployeeApp;
window.renderEmployeeApp = async function(){
  await _renderEmployeeApp();
  const myDash = document.getElementById('my-dash');
  if(!myDash) return;

  const [myStats, empData] = await Promise.all([
    fetch('/api/my-stats',{credentials:'include'}).then(r=>r.json()),
    fetch('/api/employees',{credentials:'include'}).then(r=>r.json())
  ]);

  const sorted = [...empData.employees].sort((a,b)=>b.revenue-a.revenue);
  const myRank = sorted.findIndex(e=>e.id===myStats.id||e.name===myStats.name) + 1;
  const total = sorted.length;
  const fmt = n => '$'+Math.round(n).toLocaleString();

  const rankDiv = document.createElement('div');
  rankDiv.style.cssText = 'margin-top:1rem;background:#fff;border:0.5px solid rgba(0,0,0,0.08);border-radius:14px;padding:1.25rem;';

  const pct = myRank > 0 ? Math.round(((total - myRank) / (total - 1 || 1)) * 100) : 0;
  const isFirst = myRank === 1;
  const rankColor = isFirst ? '#085041' : myRank <= 3 ? '#1D9E75' : '#888';

  rankDiv.innerHTML = `
    <div style="font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;">Your team ranking</div>
    <div style="text-align:center;padding:1rem 0 1.25rem;">
      <div style="font-size:13px;color:#888;margin-bottom:6px;">You are ranked</div>
      <div style="font-family:'DM Serif Display',serif;font-size:64px;line-height:1;color:${rankColor};">#${myRank > 0 ? myRank : '—'}</div>
      <div style="font-size:13px;color:#888;margin-top:6px;">out of ${total} employees</div>
    </div>
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:6px;"><span>#${total}</span><span>#1</span></div>
      <div style="height:10px;background:#F8F7F4;border-radius:99px;overflow:hidden;position:relative;">
        <div style="height:100%;border-radius:99px;background:${rankColor};width:${pct}%;transition:width .5s;"></div>
        <div style="position:absolute;top:50%;transform:translate(-50%,-50%);left:${pct}%;width:14px;height:14px;border-radius:50%;background:${rankColor};border:2px solid #fff;margin-top:0;"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div style="background:#F8F7F4;border-radius:10px;padding:.875rem 1rem;">
        <div style="font-size:11px;color:#888;margin-bottom:4px;font-weight:500;">Your revenue</div>
        <div style="font-size:18px;font-weight:600;color:#1a1a1a;">${fmt(myStats.revenue)}</div>
      </div>
      <div style="background:#F8F7F4;border-radius:10px;padding:.875rem 1rem;">
        <div style="font-size:11px;color:#888;margin-bottom:4px;font-weight:500;">Your earned</div>
        <div style="font-size:18px;font-weight:600;color:#085041;">${fmt(myStats.earned)}</div>
      </div>
    </div>
    ${isFirst ? `<div style="margin-top:12px;background:#EAF3DE;border-radius:10px;padding:10px 14px;text-align:center;font-size:13px;font-weight:500;color:#085041;">You're leading the team — keep it up!</div>` : myRank <= 3 ? `<div style="margin-top:12px;background:#EAF3DE;border-radius:10px;padding:10px 14px;text-align:center;font-size:13px;font-weight:500;color:#085041;">You're in the top 3 — push for #1!</div>` : `<div style="margin-top:12px;background:#FAEEDA;border-radius:10px;padding:10px 14px;text-align:center;font-size:13px;font-weight:500;color:#633806;">Keep closing deals to climb the ranks!</div>`}
  `;
  myDash.appendChild(rankDiv);
};
})();
</script>
