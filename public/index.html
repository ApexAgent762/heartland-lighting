<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartland Permanent Lighting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--green:#1D9E75;--green-light:#EAF3DE;--green-dark:#085041;--gold:#BA7517;--gold-light:#FAEEDA;--gold-dark:#633806;--purple:#534AB7;--purple-light:#EEEDFE;--bg:#F8F7F4;--card:#FFFFFF;--border:rgba(0,0,0,0.08);--text:#1a1a1a;--muted:#888;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hidden{display:none!important;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.login-card{background:var(--card);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;border:1px solid var(--border);}
.login-logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--green-dark);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:2rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.field input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;}
.field input:focus{border-color:var(--green);}
.login-btn{width:100%;padding:13px;border-radius:10px;background:var(--green-dark);color:#fff;border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.login-btn:hover{background:var(--green);}
.login-err{font-size:13px;color:#E24B4A;margin-top:10px;text-align:center;}
#app{display:none;min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10;}
.topbar-logo{font-family:'DM Serif Display',serif;font-size:17px;color:var(--green-dark);}
.logout-btn{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.logout-btn:hover{background:var(--bg);}
.tabs-wrap{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.25rem;overflow-x:auto;white-space:nowrap;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab-btn{display:inline-block;padding:14px 16px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;}
.tab-btn.active{color:var(--green-dark);border-bottom-color:var(--green-dark);}
.content{padding:1.25rem;max-width:780px;margin:0 auto;}
.view{display:none;}
.view.active{display:block;}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:1rem;}
.section-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
.earned-hero{background:var(--green-light);border-radius:var(--radius);padding:1.5rem;text-align:center;margin-bottom:1rem;}
.earned-label{font-size:13px;font-weight:500;color:var(--green);margin-bottom:6px;}
.earned-amount{font-family:'DM Serif Display',serif;font-size:52px;color:var(--green-dark);line-height:1;}
.earned-sub{font-size:13px;color:var(--green);margin-top:8px;}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem;}
.metric{background:var(--bg);border-radius:10px;padding:.875rem 1rem;}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;}
.metric-value{font-size:22px;font-weight:600;color:var(--text);}
.metric-3{grid-template-columns:repeat(3,1fr);}
.owner-hero{background:var(--green-light);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.owner-hero-amount{font-family:'DM Serif Display',serif;font-size:36px;color:var(--green-dark);}
.emp-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.emp-item:last-child{border-bottom:none;}
.emp-name{font-size:14px;font-weight:500;}
.emp-sub{font-size:12px;color:var(--muted);}
.emp-earned-amount{font-size:16px;font-weight:600;color:var(--green-dark);}
.emp-earned-rev{font-size:11px;color:var(--muted);}
.prog-track{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;border-radius:99px;background:var(--green);transition:width .3s;}
.prog-fill.blue{background:#378ADD;}
.form-row{display:grid;gap:8px;margin-bottom:10px;}
.form-row.cols2{grid-template-columns:1fr 1fr;}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr;}
.form-row.cols4{grid-template-columns:1fr 1fr 1fr auto;}
input,select,textarea{padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);width:100%;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--green);}
textarea{resize:vertical;min-height:80px;}
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn-green{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}
.btn-green:hover{background:var(--green);border-color:var(--green);}
.btn-sm{padding:6px 12px;font-size:13px;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:0 4px;}
.del-btn:hover{color:#E24B4A;}
.post-card{border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px;border:1px solid var(--border);background:var(--card);}
.post-card.quote{background:var(--gold-light);border-color:var(--gold);border-left:3px solid var(--gold);border-radius:0 var(--radius) var(--radius) 0;}
.post-card.pinned{border-left:3px solid var(--purple);border-radius:0 var(--radius) var(--radius) 0;}
.quote-text{font-family:'DM Serif Display',serif;font-size:17px;color:var(--gold-dark);line-height:1.5;margin-bottom:6px;font-style:italic;}
.quote-author{font-size:12px;color:var(--gold);font-weight:500;}
.post-body{font-size:14px;line-height:1.6;margin-bottom:6px;}
.post-meta{font-size:11px;color:var(--muted);}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:6px;vertical-align:middle;}
.badge-pin{background:var(--purple-light);color:var(--purple);}
.badge-goal{background:var(--gold-light);color:var(--gold-dark);}
.badge-achieved{background:var(--green-light);color:var(--green-dark);}
.goal-card{border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:10px;background:var(--card);}
.goal-card.achieved{border-color:var(--green);background:var(--green-light);}
.sales-table{width:100%;font-size:13px;border-collapse:collapse;}
.sales-table th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--border);}
.sales-table td{padding:10px 8px;border-bottom:1px solid var(--border);}
.sales-table tr:last-child td{border-bottom:none;}
.type-toggle{display:flex;gap:6px;margin-bottom:12px;}
.type-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;}
.type-btn.active{background:var(--green-light);color:var(--green-dark);border-color:var(--green);}
.type-btn.quote-t.active{background:var(--gold-light);color:var(--gold-dark);border-color:var(--gold);}
.q-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:1.25rem;margin-bottom:1rem;}
.q-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.q-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.q-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.q-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500;}
.q-field input{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
.q-field input:focus{border-color:var(--green);}
.q-genbtn{width:100%;padding:12px;border-radius:10px;background:var(--green-dark);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.q-genbtn:hover{background:var(--green);}
.q-doc{background:#fff;color:#1a1a1a;border-radius:14px;overflow:hidden;border:1px solid rgba(0,0,0,0.1);}
.q-doc-header{background:#0a0a0a;padding:1.5rem;text-align:center;}
.q-doc-titlebar{background:#1D9E75;padding:8px;text-align:center;font-family:'Georgia',serif;font-size:16px;color:#fff;letter-spacing:.04em;}
.q-doc-body{padding:1.25rem 1.5rem;}
.q-info-grid{border:1.5px solid #1a1a1a;border-radius:8px;overflow:hidden;margin-bottom:1rem;}
.q-info-row{display:grid;grid-template-columns:130px 1fr;border-bottom:1px solid #e0e0e0;font-size:13px;}
.q-info-row:last-child{border-bottom:none;}
.q-info-key{padding:9px 12px;font-weight:600;background:#f5f5f5;border-right:1px solid #e0e0e0;}
.q-info-val{padding:9px 12px;}
.q-sec-title{font-family:'Georgia',serif;font-size:15px;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #1D9E75;color:#1a1a1a;}
.q-includes{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:1rem;}
.q-inc{display:flex;align-items:center;gap:7px;font-size:12px;color:#1a1a1a;}
.q-dot{width:14px;height:14px;background:#1D9E75;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;color:#fff;font-weight:700;}
.q-why{list-style:none;margin-bottom:1rem;}
.q-why li{font-size:12px;color:#1a1a1a;padding:4px 0;display:flex;gap:7px;align-items:flex-start;}
.q-why-dot{width:5px;height:5px;background:#1D9E75;border-radius:50%;margin-top:5px;flex-shrink:0;}
.q-comp{background:#0a0a0a;border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.q-comp-title{font-family:'Georgia',serif;color:#fff;font-size:14px;margin-bottom:4px;text-align:center;}
.q-comp-sub{font-size:10px;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;}
.q-comp-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.q-comp-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:rgba(255,255,255,0.05);border-radius:6px;}
.q-comp-name{font-size:11px;color:rgba(255,255,255,0.7);}
.q-comp-price{font-size:12px;font-weight:600;color:#EF9F27;}
.q-comp-div{height:1px;background:rgba(255,255,255,0.1);margin:8px 0;}
.q-hl-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1D9E75;border-radius:6px;}
.q-hl-label{font-size:12px;color:#fff;font-weight:600;}
.q-hl-price{font-size:16px;font-weight:700;color:#fff;}
.q-save-note{text-align:center;font-size:10px;color:rgba(255,255,255,0.6);margin-top:8px;}
.q-note{font-size:11px;color:#444;margin-bottom:.5rem;}
.q-resetbtn{width:100%;padding:9px;border-radius:8px;background:transparent;color:var(--muted);border:1px solid rgba(0,0,0,0.12);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;}
.price-struck{color:#999;text-decoration:line-through;margin-right:5px;font-size:12px;}
.price-green{color:#085041;font-weight:700;font-size:15px;}
@media(max-width:480px){.form-row.cols3,.form-row.cols4{grid-template-columns:1fr 1fr;}.owner-hero{flex-direction:column;gap:8px;text-align:center;}.metric-3{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="login-screen">
<div class="login-card">
<div class="login-logo">Heartland Permanent Lighting</div>
<div class="login-sub">Sign in to your dashboard</div>
<div class="field"><label>Username</label><input type="text" id="l-user" placeholder="Enter username" autocomplete="username"></div>
<div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="Enter password" autocomplete="current-password"></div>
<button class="login-btn" onclick="doLogin()">Sign in</button>
<div class="login-err hidden" id="l-err">Invalid username or password</div>
</div>
</div>
<div id="app">
<div class="topbar">
<div class="topbar-logo">Heartland</div>
<div style="display:flex;align-items:center;gap:12px;">
<span style="font-size:13px;color:var(--muted);" id="topbar-name"></span>
<button class="logout-btn" onclick="doLogout()">Sign out</button>
</div>
</div>
<div class="tabs-wrap" id="tabs-wrap"></div>
<div class="content" id="content"></div>
</div>
<script>
let currentUser=null;
const EMP_COLORS=['#1D9E75','#378ADD','#534AB7','#BA7517','#D85A30','#D4537E','#639922','#888780','#E24B4A'];
const STATUS_COLORS={new:{bg:'#FAEEDA',color:'#633806',label:'New'},ordered:{bg:'#E6F1FB',color:'#0C447C',label:'Lights ordered'},scheduled:{bg:'#EEEDFE',color:'#3C3489',label:'Scheduled'},installed:{bg:'#EAF3DE',color:'#085041',label:'Installed'}};
async function api(method,path,body){const res=await fetch(path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined,credentials:'include'});return res.json();}
async function doLogin(){const username=document.getElementById('l-user').value.trim();const password=document.getElementById('l-pass').value.trim();const err=document.getElementById('l-err');err.classList.add('hidden');const res=await api('POST','/api/login',{username,password});if(res.error){err.classList.remove('hidden');return;}currentUser=res;showApp();}
async function doLogout(){await api('POST','/api/logout');currentUser=null;document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';}
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function fmt(n){return'$'+Math.round(n).toLocaleString();}
function pct(a,b){return b>0?Math.min(100,Math.round((a/b)*100)):0;}
function ini(name){return name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function setupTabs(tabs,def){const wrap=document.getElementById('tabs-wrap');const content=document.getElementById('content');wrap.innerHTML=tabs.map(t=>`<button class="tab-btn ${t.id===def?'active':''}" onclick="switchTab('${t.id}',this)">${t.label}</button>`).join('');content.innerHTML=tabs.map(t=>`<div class="view ${t.id===def?'active':''}" id="${t.id}"></div>`).join('');}
function switchTab(id,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));btn.classList.add('active');document.getElementById(id).classList.add('active');}
function postHTML(p,canDelete){if(p.type==='quote'){return`<div class="post-card quote"><div class="quote-text">"${p.body}"</div><div class="quote-author">— ${p.author}</div><div style="display:flex;justify-content:space-between;margin-top:8px;"><div style="font-size:11px;color:var(--gold);">Weekly quote · ${p.date}</div>${canDelete?`<button class="del-btn" onclick="deletePost(${p.id})">×</button>`:''}</div></div>`;}return`<div class="post-card ${p.pin?'pinned':''}"><div style="display:flex;justify-content:space-between;margin-bottom:6px;"><div style="font-size:12px;font-weight:500;">To: ${p.target}${p.pin?'<span class="badge badge-pin">Pinned</span>':''}</div>${canDelete?`<button class="del-btn" onclick="deletePost(${p.id})">×</button>`:''}</div><div class="post-body">${p.body}</div><div class="post-meta">${p.date}</div></div>`;}
function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';document.getElementById('topbar-name').textContent=currentUser.name;if(currentUser.role==='owner')renderOwnerApp();else if(currentUser.role==='secretary')renderSecretaryApp();else renderEmployeeApp();}

// ─── CALENDAR ───
function buildCalendar(sales,rate,containerId,showAll,employees){
  const el=document.getElementById(containerId);if(!el)return;
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let weekOffset=0;
  function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function getWeek(off){const now=new Date();const start=new Date(now);start.setDate(now.getDate()-now.getDay()+(off*7));return Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d;});}
  function render(){
    const dates=getWeek(weekOffset);const todayStr=ds(new Date());
    const startL=monthNames[dates[0].getMonth()]+' '+dates[0].getDate();
    const endL=monthNames[dates[6].getMonth()]+' '+dates[6].getDate()+', '+dates[6].getFullYear();
    const weekSales=sales.filter(s=>{const d=new Date(s.date+'T12:00:00');return dates.some(wd=>ds(wd)===ds(d));});
    const weekEarned=weekSales.reduce((sum,s)=>{if(showAll&&employees){const emp=employees.find(e=>e.id===s.userId);return sum+(emp?s.amount*(emp.rate/100):0);}return sum+s.amount*(rate/100);},0);
    const weekRev=weekSales.reduce((sum,s)=>sum+s.amount,0);
    el.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <button onclick="window['_cn_${containerId}'](-1)" style="background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;">← Prev</button>
        <div style="font-size:14px;font-weight:500;color:var(--text);">${startL} – ${endL}</div>
        <button onclick="window['_cn_${containerId}'](1)" style="background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;">Next →</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;">
        <div style="background:var(--bg);border-radius:10px;padding:.875rem 1rem;"><div style="font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;">${showAll?'Week revenue':'Week earned'}</div><div style="font-size:22px;font-weight:600;">${showAll?fmt(weekRev):fmt(weekEarned)}</div></div>
        <div style="background:var(--bg);border-radius:10px;padding:.875rem 1rem;"><div style="font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;">Jobs this week</div><div style="font-size:22px;font-weight:600;">${weekSales.length}</div></div>
        <div style="background:var(--bg);border-radius:10px;padding:.875rem 1rem;"><div style="font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;">Avg per job</div><div style="font-size:22px;font-weight:600;">${weekSales.length>0?fmt((showAll?weekRev:weekEarned)/weekSales.length):'$0'}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem;">
        ${dayNames.map(d=>`<div style="text-align:center;font-size:10px;font-weight:600;color:var(--muted);padding:4px 0;text-transform:uppercase;letter-spacing:.04em;">${d}</div>`).join('')}
        ${dates.map(d=>{
          const dayStr=ds(d);const dayJobs=sales.filter(s=>ds(new Date(s.date+'T12:00:00'))===dayStr);const isToday=dayStr===todayStr;const hasJob=dayJobs.length>0;
          const dots=showAll&&employees?dayJobs.map(j=>{const emp=employees.find(e=>e.id===j.userId);const color=emp?EMP_COLORS[employees.indexOf(emp)%EMP_COLORS.length]:'#1D9E75';return`<div style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block;margin:1px;"></div>`;}).join(''):(hasJob?`<div style="background:#EAF3DE;border-radius:4px;padding:2px 4px;font-size:10px;color:#085041;font-weight:600;margin-bottom:2px;">${dayJobs.length} job${dayJobs.length>1?'s':''}</div><div style="font-size:10px;color:#3B6D11;font-weight:500;">${fmt(dayJobs.reduce((s,j)=>s+j.amount*(rate/100),0))}</div>`:'');
          return`<div style="background:${hasJob?'#EAF3DE':'var(--card)'};border:${isToday?'1.5px solid #1D9E75':'0.5px solid rgba(0,0,0,0.08)'};border-radius:8px;padding:6px;min-height:64px;"><div style="font-size:12px;font-weight:${isToday?'700':'500'};color:${isToday?'#085041':'var(--muted)'};margin-bottom:4px;">${d.getDate()}</div>${dots}</div>`;
        }).join('')}
      </div>

window.qCalc=function(){const ft=parseFloat(document.getElementById('qa-ft').value)||0;const ppf=parseFloat(document.getElementById('qa-ppf').value)||0;const disc=parseFloat(document.getElementById('qa-disc').value)||0;const orig=ft*ppf;const final=Math.max(0,orig-disc);document.getElementById('qc-orig').textContent=fmt(orig);document.getElementById('qc-final').textContent=fmt(final);document.getElementById('qc-disc').textContent=fmt(disc);};
window.qGenerate=function(){const addr=document.getElementById('qa-addr').value.trim();const bld=document.getElementById('qa-bld').value.trim();const ft=parseFloat(document.getElementById('qa-ft').value)||0;const ppf=parseFloat(document.getElementById('qa-ppf').value)||0;const disc=parseFloat(document.getElementById('qa-disc').value)||0;if(!addr||!ft||!ppf){alert('Please fill in address, footage, and price per foot.');return;}const orig=ft*ppf;const final=Math.max(0,orig-disc);document.getElementById('qr-addr').textContent=addr;document.getElementById('qr-bld').textContent=bld||'Residential';document.getElementById('qr-ft').textContent=ft+' ft';const priceEl=document.getElementById('qr-price');priceEl.innerHTML=disc>0?`<span class="price-struck">${fmt(orig)}</span> → <span class="price-green">${fmt(final)}</span>`:`<span class="price-green">${fmt(final)}</span>`;document.getElementById('qr-comp-ft').textContent='Based on '+ft+' ft installation';document.getElementById('qr-hl-price').textContent=fmt(final);const comps=[{name:'Trimlight System',low:18,high:35},{name:'JellyFish Lighting',low:25,high:35},{name:'Astoria Lighting Co.',low:20,high:28},{name:'Leading Edge / Small installers',low:17,high:22}];document.getElementById('qr-comp-list').innerHTML=comps.map(c=>`<div class="q-comp-item"><div class="q-comp-name">${c.name}</div><div class="q-comp-price">${fmt(Math.round(c.low*ft))} – ${fmt(Math.round(c.high*ft))}</div></div>`).join('');const savings=Math.round(17*ft)-final;document.getElementById('qr-save-note').textContent=savings>0?'Save up to '+fmt(savings)+' compared to competitors':'Professional installation at an unbeatable price';document.getElementById('qform').style.display='none';document.getElementById('qdoc-wrap').style.display='block';};
window.qReset=function(){document.getElementById('qform').style.display='block';document.getElementById('qdoc-wrap').style.display='none';};
window.qSubmit=async function(){const addr=document.getElementById('qa-addr').value.trim();const bld=document.getElementById('qa-bld').value.trim();const ft=parseFloat(document.getElementById('qa-ft').value)||0;const ppf=parseFloat(document.getElementById('qa-ppf').value)||0;const disc=parseFloat(document.getElementById('qa-disc').value)||0;const final=Math.max(0,ft*ppf-disc);const btn=document.getElementById('q-submit-btn');await api('POST','/api/quotes',{address:addr,building:bld,footage:ft,price:ppf,discount:disc,finalPrice:final});btn.textContent='Submitted!';btn.style.background='#1D9E75';setTimeout(()=>{btn.textContent='Submit quote to secretary';btn.style.background='#085041';},3000);};

  document.getElementById('goals').innerHTML=`<div class="card"><div class="section-label">Set a goal</div><div class="form-row cols4"><select id="g-emp">${empOptions}</select><input type="number" id="g-target" placeholder="Target $"><input type="text" id="g-prize" placeholder="Prize (e.g. $500 cash)"><button class="btn btn-green" onclick="addGoal()">+ Set</button></div></div>${goals.length===0?'<div style="font-size:14px;color:var(--muted);padding:.5rem 0;">No goals set yet.</div>':goals.map(g=>{const e=empData.employees.find(x=>x.id===g.userId);if(!e)return'';const p=pct(e.revenue,g.target);const achieved=e.revenue>=g.target;return`<div class="goal-card ${achieved?'achieved':''}"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div class="avatar" style="width:32px;height:32px;font-size:11px;background:${e.color};color:${e.tc}">${ini(e.name)}</div><div style="flex:1;"><div style="font-size:14px;font-weight:500;">${e.name}</div><span class="badge ${achieved?'badge-achieved':'badge-goal'}">${achieved?'Achieved: ':'Prize: '}${g.prize}</span></div><div style="text-align:right;font-size:13px;font-weight:500;">${fmt(e.revenue)} / ${fmt(g.target)}</div><button class="del-btn" onclick="deleteGoal(${g.id})">×</button></div><div class="prog-track" style="height:10px;"><div class="prog-fill ${achieved?'':'blue'}" style="width:${p}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted);"><span>Current: ${fmt(e.revenue)}</span><span style="color:${achieved?'var(--green)':'var(--muted)'};">${achieved?'Unlocked!':'Need '+fmt(Math.max(0,g.target-e.revenue))+' more'}</span><span>Target: ${fmt(g.target)}</span></div></div>`;}).join('')}`;}

function renderOwnerQuotes(empData,quotes){
  const statusOpts=Object.entries(STATUS_COLORS).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
  const quoteCard=q=>{const s=STATUS_COLORS[q.status]||STATUS_COLORS.new;return`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><div><div style="font-size:15px;font-weight:600;">${q.address}</div><div style="font-size:12px;color:var(--muted);">${q.employeeName} · ${q.date} · ${q.footage}ft</div></div><div style="text-align:right;"><div style="font-size:18px;font-weight:600;color:var(--green-dark);">${fmt(q.finalPrice)}</div><span style="font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;background:${s.bg};color:${s.color};">${s.label}</span></div></div><div class="form-row cols2"><select onchange="api('PATCH','/api/quotes/${q.id}',{status:this.value})" style="padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;font-family:'DM Sans',sans-serif;">${Object.entries(STATUS_COLORS).map(([k,v])=>`<option value="${k}" ${q.status===k?'selected':''}>${v.label}</option>`).join('')}</select><button onclick="api('DELETE','/api/quotes/${q.id}').then(()=>refreshOwner())" style="padding:7px;border-radius:8px;border:1px solid #E24B4A;background:transparent;color:#E24B4A;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;">Remove</button></div><textarea placeholder="Notes..." onchange="api('PATCH','/api/quotes/${q.id}',{notes:this.value})" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:55px;">${q.notes||''}</textarea></div>`;};

  document.getElementById('quotes').innerHTML=quotes.length===0?'<div style="font-size:14px;color:var(--muted);">No quotes submitted yet.</div>':`${newQ.length>0?`<div class="section-label">New (${newQ.length})</div>${newQ.map(quoteCard).join('')}`:''}${otherQ.length>0?`<div class="section-label" style="margin-top:12px;">In progress / completed</div>${otherQ.map(quoteCard).join('')}`:''}`;
}

function renderPayTracker(empData,allSales){
  document.getElementById('payments').innerHTML=allSales.length===0?'<div style="font-size:14px;color:var(--muted);">No sales logged yet.</div>':`<div class="card">${allSales.map(s=>{const emp=empData.employees.find(e=>e.id===s.userId);if(!emp)return'';const comm=s.amount*(emp.rate/100);return`<div style="display:grid;grid-template-columns:1fr 70px 70px 90px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);${s.paid?'opacity:0.5':''}"><div><div style="font-size:13px;font-weight:500;">${emp.name}</div><div style="font-size:11px;color:var(--muted);">${s.address||s.date}</div></div><div style="font-size:13px;">${fmt(s.amount)}</div><div style="font-size:13px;color:var(--green-dark);font-weight:500;">${fmt(comm)}</div><button onclick="togglePaid(${s.id},${!s.paid})" style="padding:5px 10px;border-radius:6px;border:1px solid;font-size:11px;font-weight:500;cursor:pointer;background:${s.paid?'transparent':'#085041'};color:${s.paid?'#888':'#fff'};border-color:${s.paid?'rgba(0,0,0,0.12)':'#085041'};">${s.paid?'Paid':'Mark paid'}</button></div>`;}).join('')}</div>`;}

  document.getElementById('sec-summary').innerHTML=`${unpaidCount>0?`<div style="background:#FAEEDA;border-radius:10px;padding:12px 1rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;border-left:3px solid #BA7517;"><div><div style="font-size:13px;color:#633806;font-weight:500;">Commissions to pay out</div><div style="font-size:11px;color:#854F0B;margin-top:2px;">${unpaidCount} sale${unpaidCount!==1?'s':''} not yet marked paid</div></div><div style="font-size:18px;font-weight:600;color:#633806;">${fmt((summary.unpaidTotal||0)*0.4)}</div></div>`:`<div style="background:#EAF3DE;border-radius:10px;padding:12px 1rem;margin-bottom:1rem;font-size:13px;color:#085041;font-weight:500;">All commissions paid up to date</div>`}<div class="metrics"><div class="metric"><div class="metric-label">Today's revenue</div><div class="metric-value">${fmt(summary.todayRev||0)}</div><div style="font-size:11px;color:var(--muted);margin-top:3px;">${summary.todaySales||0} sales today</div></div><div class="metric"><div class="metric-label">This week's revenue</div><div class="metric-value">${fmt(summary.weekRev||0)}</div><div style="font-size:11px;color:var(--muted);margin-top:3px;">${summary.weekSales||0} sales this week</div></div></div>${summary.topPerformer?`<div style="background:#EAF3DE;border-radius:10px;padding:12px 1rem;display:flex;align-items:center;justify-content:space-between;border-left:3px solid var(--green);"><div><div style="font-size:13px;color:#085041;font-weight:500;">Top performer</div><div style="font-size:16px;font-weight:600;color:#085041;">${summary.topPerformer.name}</div></div><div style="font-size:16px;font-weight:600;color:#085041;">${fmt(summary.topPerformer.revenue)}</div></div>`:''}`;

  document.getElementById('sec-goals').innerHTML=goals.length===0?'<div style="font-size:14px;color:var(--muted);">No goals set yet.</div>':goals.map(g=>{const e=employees.find(x=>x.id===g.userId);if(!e)return'';const p=pct(e.revenue,g.target);const achieved=e.revenue>=g.target;return`<div class="goal-card ${achieved?'achieved':''}"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div class="avatar" style="width:32px;height:32px;font-size:11px;background:${e.color};color:${e.tc}">${ini(e.name)}</div><div style="flex:1;"><div style="font-size:14px;font-weight:500;">${e.name}</div><span class="badge ${achieved?'badge-achieved':'badge-goal'}">${achieved?'Achieved: ':'Prize: '}${g.prize}</span></div><div style="font-size:13px;font-weight:500;">${fmt(e.revenue)} / ${fmt(g.target)}</div></div><div class="prog-track" style="height:10px;"><div class="prog-fill ${achieved?'':'blue'}" style="width:${p}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted);"><span>Current: ${fmt(e.revenue)}</span><span style="color:${achieved?'var(--green)':'var(--muted)'};">${achieved?'Unlocked!':'Need '+fmt(Math.max(0,g.target-e.revenue))+' more'}</span><span>Target: ${fmt(g.target)}</span></div></div>`;}).join('');

  const quoteCard=q=>{const s=STATUS_COLORS[q.status]||STATUS_COLORS.new;return`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><div><div style="font-size:15px;font-weight:600;">${q.address}</div><div style="font-size:12px;color:var(--muted);">${q.employeeName} · ${q.date} · ${q.footage}ft</div></div><div style="text-align:right;"><div style="font-size:18px;font-weight:600;color:var(--green-dark);">${fmt(q.finalPrice)}</div><span style="font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;background:${s.bg};color:${s.color};">${s.label}</span></div></div><div class="form-row cols2"><select onchange="api('PATCH','/api/quotes/${q.id}',{status:this.value})" style="padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;font-family:'DM Sans',sans-serif;">${Object.entries(STATUS_COLORS).map(([k,v])=>`<option value="${k}" ${q.status===k?'selected':''}>${v.label}</option>`).join('')}</select><button onclick="api('DELETE','/api/quotes/${q.id}').then(()=>renderSecretaryApp())" style="padding:7px;border-radius:8px;border:1px solid #E24B4A;background:transparent;color:#E24B4A;font-size:13px;cursor:pointer;">Remove</button></div><textarea placeholder="Notes..." onchange="api('PATCH','/api/quotes/${q.id}',{notes:this.value})" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:55px;">${q.notes||''}</textarea></div>`;};

  document.getElementById('sec-quotes').innerHTML=quotes.length===0?'<div style="font-size:14px;color:var(--muted);">No quotes submitted yet.</div>':`${newQ.length>0?`<div class="section-label">New (${newQ.length})</div>${newQ.map(quoteCard).join('')}`:''}${otherQ.length>0?`<div class="section-label" style="margin-top:12px;">In progress / completed</div>${otherQ.map(quoteCard).join('')}`:''}`;

  document.getElementById('sec-payments').innerHTML=allSales.length===0?'<div style="font-size:14px;color:var(--muted);">No sales logged yet.</div>':`<div class="card">${allSales.map(s=>{const emp=employees.find(e=>e.id===s.userId);if(!emp)return'';const comm=s.amount*(emp.rate/100);return`<div style="display:grid;grid-template-columns:1fr 70px 70px 90px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);${s.paid?'opacity:0.5':''}"><div><div style="font-size:13px;font-weight:500;">${emp.name}</div><div style="font-size:11px;color:var(--muted);">${s.address||s.date}</div></div><div style="font-size:13px;">${fmt(s.amount)}</div><div style="font-size:13px;color:var(--green-dark);font-weight:500;">${fmt(comm)}</div><button onclick="secTogglePaid(${s.id},${!s.paid})" style="padding:5px 10px;border-radius:6px;border:1px solid;font-size:11px;font-weight:500;cursor:pointer;background:${s.paid?'transparent':'#085041'};color:${s.paid?'#888':'#fff'};border-color:${s.paid?'rgba(0,0,0,0.12)':'#085041'};">${s.paid?'Paid':'Mark paid'}</button></div>`;}).join('')}</div>`;

  document.getElementById('sec-board').innerHTML=posts.length===0?'<div style="font-size:14px;color:var(--muted);">No posts yet.</div>':[...posts].sort((a,b)=>(b.pin?1:0)-(a.pin?1:0)).map(p=>postHTML(p,false)).join('');

// ─── ACTIONS ───
function setBoardType(t){document.getElementById('compose-msg').classList.toggle('hidden',t!=='msg');document.getElementById('compose-quote').classList.toggle('hidden',t!=='quote');document.getElementById('tb-msg').classList.toggle('active',t==='msg');document.getElementById('tb-quote').classList.toggle('active',t==='quote');}
async function postMessage(){const body=document.getElementById('p-body').value.trim();const target=document.getElementById('p-target').value.trim()||'All team';const pin=document.getElementById('p-pin').checked;if(!body)return;await api('POST','/api/posts',{type:'message',body,target,pin});await refreshOwner();}
async function postQuote(){const body=document.getElementById('q-body').value.trim();const author=document.getElementById('q-author').value.trim()||'Unknown';if(!body)return;await api('POST','/api/posts',{type:'quote',body,author});await refreshOwner();}
async function deletePost(id){await api('DELETE',`/api/posts/${id}`);await refreshOwner();}
async function addGoal(){const userId=document.getElementById('g-emp').value;const target=document.getElementById('g-target').value;const prize=document.getElementById('g-prize').value.trim();if(!target||!prize)return;await api('POST','/api/goals',{userId,target,prize});document.getElementById('g-target').value='';document.getElementById('g-prize').value='';await refreshOwner();}
async function deleteGoal(id){await api('DELETE',`/api/goals/${id}`);await refreshOwner();}
async function logSale(){const userId=document.getElementById('s-emp').value;const amount=document.getElementById('s-amount').value;const address=document.getElementById('s-address').value;const date=document.getElementById('s-date').value;if(!amount)return;await api('POST','/api/sales',{userId,amount,address,date});document.getElementById('s-amount').value='';document.getElementById('s-address').value='';const c=document.getElementById('s-confirm');c.classList.remove('hidden');setTimeout(()=>c.classList.add('hidden'),3000);await refreshOwner();}
async function saveOwnerSales(){await api('POST','/api/owner-sales',{revenue:document.getElementById('o-rev').value,installs:document.getElementById('o-inst').value});await refreshOwner();}
async function addEmployee(){const name=document.getElementById('m-name').value.trim();const username=document.getElementById('m-user').value.trim();const password=document.getElementById('m-pass').value.trim();const rate=document.getElementById('m-rate').value;if(!name||!username||!password)return;await api('POST','/api/employees',{name,username,password,rate});document.getElementById('m-name').value='';document.getElementById('m-user').value='';document.getElementById('m-pass').value='';document.getElementById('m-rate').value='';const c=document.getElementById('m-confirm');c.classList.remove('hidden');setTimeout(()=>c.classList.add('hidden'),3000);await refreshOwner();}
async function updateRate(id){await api('PATCH',`/api/employees/${id}`,{rate:document.getElementById(`rate-${id}`).value});await refreshOwner();}
async function updatePassword(id){const pw=document.getElementById(`pw-${id}`).value;if(!pw)return;await api('PATCH',`/api/employees/${id}`,{password:pw});document.getElementById(`pw-${id}`).value='';alert('Password updated!');}
async function togglePaid(id,paid){await api('PATCH',`/api/sales/${id}/paid`,{paid});await refreshOwner();}
async function secTogglePaid(id,paid){await api('PATCH',`/api/sales/${id}/paid`,{paid});await renderSecretaryApp();}
(async()=>{try{const me=await api('GET','/api/me');if(me&&me.role){currentUser=me;showApp();}}catch{}})();
</script>
</body>
</html>
<script>
(function(){
const _renderEmployeeApp = window.renderEmployeeApp;
window.renderEmployeeApp = async function(){
  await _renderEmployeeApp();
  const wrap = document.getElementById('tabs-wrap');
  const content = document.getElementById('content');
  const tab = document.createElement('button');
  tab.className = 'tab-btn';
  tab.textContent = 'My gallery';
  tab.onclick = function(){ switchTab('gallery-tab', this); loadGallery(); };
  wrap.appendChild(tab);
  const view = document.createElement('div');
  view.className = 'view';
  view.id = 'gallery-tab';
  view.innerHTML = '<div style="font-size:14px;color:#888;padding:1rem 0;">Loading...</div>';
  content.appendChild(view);
};

window.loadGallery = async function(){
  const el = document.getElementById('gallery-tab');
  if(!el) return;
  const photos = await fetch('/api/photos',{credentials:'include'}).then(r=>r.json());
  el.innerHTML = `
    <div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:14px;padding:1.25rem;margin-bottom:1rem;">
      <div style="font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;">Upload job photo</div>
      <div style="margin-bottom:10px;">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;font-weight:500;">Job address</label>
        <input type="text" id="photo-addr" placeholder="123 Main St" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid rgba(0,0,0,0.12);background:#F8F7F4;color:#1a1a1a;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;">
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;font-weight:500;">Photo</label>
        <input type="file" id="photo-file" accept="image/*" style="width:100%;padding:9px;border-radius:8px;border:1px solid rgba(0,0,0,0.12);background:#F8F7F4;font-size:13px;font-family:'DM Sans',sans-serif;">
      </div>
      <button onclick="uploadPhoto()" style="width:100%;padding:11px;border-radius:10px;background:#085041;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Upload photo</button>
      <div id="upload-status" style="font-size:13px;margin-top:8px;text-align:center;"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;" id="photo-grid">
      ${photos.length === 0 ? '<div style="grid-column:1/-1;font-size:14px;color:#888;text-align:center;padding:2rem 0;">No photos yet — upload your first completed job!</div>' :
        photos.map(p => `
          <div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;overflow:hidden;">
            <img src="${p.url}" style="width:100%;height:160px;object-fit:cover;display:block;">
            <div style="padding:10px 12px;">
              <div style="font-size:13px;font-weight:500;color:#1a1a1a;">${p.address||'Job photo'}</div>
              <div style="font-size:11px;color:#888;margin-top:2px;">${p.date}</div>
            </div>
          </div>`).join('')}
    </div>
  `;
};

window.uploadPhoto = async function(){
  const addr = document.getElementById('photo-addr').value.trim();
  const file = document.getElementById('photo-file').files[0];
  const status = document.getElementById('upload-status');
  if(!file){ status.textContent = 'Please select a photo.'; status.style.color='#E24B4A'; return; }
  status.textContent = 'Uploading...'; status.style.color='#888';
  const reader = new FileReader();
  reader.onload = async function(e){
    const res = await fetch('/api/photos',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({image:e.target.result,address:addr})});
    const data = await res.json();
    if(data.ok){ status.textContent='Uploaded!'; status.style.color='#085041'; loadGallery(); }
    else{ status.textContent='Upload failed: '+data.error; status.style.color='#E24B4A'; }
  };
  reader.readAsDataURL(file);
};

// Add gallery to owner and secretary
const _refreshOwner = window.refreshOwner;
window.refreshOwner = async function(){
  await _refreshOwner();
  loadTeamGallery('owner-gallery');
};
const _renderSecretaryApp = window.renderSecretaryApp;
window.renderSecretaryApp = async function(){
  await _renderSecretaryApp();
  const wrap = document.getElementById('tabs-wrap');
  const content = document.getElementById('content');
  const tab = document.createElement('button');
  tab.className = 'tab-btn';
  tab.textContent = 'Job gallery';
  tab.onclick = function(){ switchTab('sec-gallery', this); loadTeamGallery('sec-gallery'); };
  wrap.appendChild(tab);
  const view = document.createElement('div');
  view.className = 'view';
  view.id = 'sec-gallery';
  view.innerHTML = '<div style="font-size:14px;color:#888;padding:1rem 0;">Loading...</div>';
  content.appendChild(view);
};

window.loadTeamGallery = async function(containerId){
  const el = document.getElementById(containerId);
  if(!el) return;
  const photos = await fetch('/api/photos',{credentials:'include'}).then(r=>r.json());
  if(!photos.length){ el.innerHTML='<div style="font-size:14px;color:#888;">No photos uploaded yet.</div>'; return; }
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${photos.map(p=>`
        <div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;overflow:hidden;">
          <img src="${p.url}" style="width:100%;height:160px;object-fit:cover;display:block;">
          <div style="padding:10px 12px;">
            <div style="font-size:13px;font-weight:500;color:#1a1a1a;">${p.address||'Job photo'}</div>
            <div style="font-size:11px;color:#888;margin-top:2px;">${p.employeeName} · ${p.date}</div>
          </div>
        </div>`).join('')}
    </div>`;
};

})();
</script>
