<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartland Permanent Lighting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--green:#1D9E75;--gl:#EAF3DE;--gd:#085041;--gold:#BA7517;--goldl:#FAEEDA;--goldd:#633806;--pur:#534AB7;--purl:#EEEDFE;--bg:#F8F7F4;--card:#fff;--brd:rgba(0,0,0,0.08);--txt:#1a1a1a;--mut:#888;--rad:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
.hidden{display:none!important;}
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.lc{background:var(--card);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;border:1px solid var(--brd);}
.ll{font-family:'DM Serif Display',serif;font-size:22px;color:var(--gd);margin-bottom:4px;}
.ls2{font-size:13px;color:var(--mut);margin-bottom:2rem;}
.fd{margin-bottom:1rem;}
.fd label{display:block;font-size:12px;font-weight:500;color:var(--mut);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.fd input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--brd);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);outline:none;}
.fd input:focus{border-color:var(--green);}
.lb{width:100%;padding:13px;border-radius:10px;background:var(--gd);color:#fff;border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.lb:hover{background:var(--green);}
.le{font-size:13px;color:#E24B4A;margin-top:10px;text-align:center;}
#app{display:none;min-height:100vh;}
.tb{background:var(--card);border-bottom:1px solid var(--brd);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10;}
.tbl{font-family:'DM Serif Display',serif;font-size:17px;color:var(--gd);}
.lo{font-size:13px;color:var(--mut);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.lo:hover{background:var(--bg);}
.tw{background:var(--card);border-bottom:1px solid var(--brd);padding:0 1.25rem;overflow-x:auto;white-space:nowrap;}
.tw::-webkit-scrollbar{display:none;}
.tn{display:inline-block;padding:14px 16px;font-size:13px;font-weight:500;color:var(--mut);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;}
.tn.active{color:var(--gd);border-bottom-color:var(--gd);}
.ct{padding:1.25rem;max-width:780px;margin:0 auto;}
.vw{display:none;}
.vw.active{display:block;}
.card{background:var(--card);border-radius:var(--rad);border:1px solid var(--brd);padding:1.25rem;margin-bottom:1rem;}
.sl{font-size:11px;font-weight:600;color:var(--mut);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
.eh{background:var(--gl);border-radius:var(--rad);padding:1.5rem;text-align:center;margin-bottom:1rem;}
.el{font-size:13px;font-weight:500;color:var(--green);margin-bottom:6px;}
.ea{font-family:'DM Serif Display',serif;font-size:52px;color:var(--gd);line-height:1;}
.es{font-size:13px;color:var(--green);margin-top:8px;}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem;}
.mt{background:var(--bg);border-radius:10px;padding:.875rem 1rem;}
.ml{font-size:11px;color:var(--mut);margin-bottom:4px;font-weight:500;}
.mv{font-size:22px;font-weight:600;color:var(--txt);}
.m3{grid-template-columns:repeat(3,1fr);}
.oh{background:var(--gl);border-radius:var(--rad);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.oa{font-family:'DM Serif Display',serif;font-size:36px;color:var(--gd);}
.ei{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--brd);}
.ei:last-child{border-bottom:none;}
.en{font-size:14px;font-weight:500;}
.es2{font-size:12px;color:var(--mut);}
.ee{font-size:16px;font-weight:600;color:var(--gd);}
.er{font-size:11px;color:var(--mut);}
.pt{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin:6px 0;}
.pf{height:100%;border-radius:99px;background:var(--green);transition:width .3s;}
.pf.bl{background:#378ADD;}
.fr{display:grid;gap:8px;margin-bottom:10px;}
.fr.c2{grid-template-columns:1fr 1fr;}
.fr.c3{grid-template-columns:1fr 1fr 1fr;}
.fr.c4{grid-template-columns:1fr 1fr 1fr auto;}
input,select,textarea{padding:9px 12px;border-radius:8px;border:1px solid var(--brd);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);width:100%;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--green);}
textarea{resize:vertical;min-height:80px;}
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--txt);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.bg{background:var(--gd);color:#fff;border-color:var(--gd);}
.bg:hover{background:var(--green);}
.bs{padding:6px 12px;font-size:13px;}
.db{background:none;border:none;cursor:pointer;color:var(--mut);font-size:18px;line-height:1;padding:0 4px;}
.db:hover{color:#E24B4A;}
.pc{border-radius:var(--rad);padding:1rem 1.25rem;margin-bottom:10px;border:1px solid var(--brd);background:var(--card);}
.pc.qt{background:var(--goldl);border-color:var(--gold);border-left:3px solid var(--gold);border-radius:0 var(--rad) var(--rad) 0;}
.pc.pn{border-left:3px solid var(--pur);border-radius:0 var(--rad) var(--rad) 0;}
.qt-txt{font-family:'DM Serif Display',serif;font-size:17px;color:var(--goldd);line-height:1.5;margin-bottom:6px;font-style:italic;}
.qt-au{font-size:12px;color:var(--gold);font-weight:500;}
.pb{font-size:14px;line-height:1.6;margin-bottom:6px;}
.pm{font-size:11px;color:var(--mut);}
.bdg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:6px;vertical-align:middle;}
.bp{background:var(--purl);color:var(--pur);}
.bg2{background:var(--goldl);color:var(--goldd);}
.ba{background:var(--gl);color:var(--gd);}
.gc{border-radius:var(--rad);border:1px solid var(--brd);padding:1.25rem;margin-bottom:10px;background:var(--card);}
.gc.ach{border-color:var(--green);background:var(--gl);}
.st{width:100%;font-size:13px;border-collapse:collapse;}
.st th{text-align:left;font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--brd);}
.st td{padding:10px 8px;border-bottom:1px solid var(--brd);}
.st tr:last-child td{border-bottom:none;}
.tt{display:flex;gap:6px;margin-bottom:12px;}
.ttb{padding:5px 14px;border-radius:20px;border:1px solid var(--brd);background:transparent;color:var(--mut);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;}
.ttb.active{background:var(--gl);color:var(--gd);border-color:var(--green);}
.ttb.qt2.active{background:var(--goldl);color:var(--goldd);border-color:var(--gold);}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ph-card{background:var(--card);border:1px solid var(--brd);border-radius:12px;overflow:hidden;}
.ph-card img{width:100%;height:160px;object-fit:cover;display:block;}
.ph-info{padding:10px 12px;}
@media(max-width:480px){.fr.c3,.fr.c4{grid-template-columns:1fr 1fr;}.oh{flex-direction:column;gap:8px;text-align:center;}.m3{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="ls">
<div class="lc">
<div class="ll">Heartland Permanent Lighting</div>
<div class="ls2">Sign in to your dashboard</div>
<div class="fd"><label>Username</label><input type="text" id="lu" placeholder="Enter username" autocomplete="username"></div>
<div class="fd"><label>Password</label><input type="password" id="lp" placeholder="Enter password" autocomplete="current-password"></div>
<button class="lb" onclick="doLogin()">Sign in</button>
<div class="le hidden" id="le">Invalid username or password</div>
</div>
</div>
<div id="app">
<div class="tb">
<div class="tbl">Heartland</div>
<div style="display:flex;align-items:center;gap:12px;">
<span style="font-size:13px;color:var(--mut);" id="un"></span>
<button class="lo" onclick="doLogout()">Sign out</button>
</div>
</div>
<div class="tw" id="tw"></div>
<div class="ct" id="ct"></div>
</div>
<script>
let CU=null;
const EC=['#1D9E75','#378ADD','#534AB7','#BA7517','#D85A30','#D4537E','#639922','#888780','#E24B4A'];
const SC={new:{bg:'#FAEEDA',c:'#633806',l:'New'},ordered:{bg:'#E6F1FB',c:'#0C447C',l:'Lights ordered'},scheduled:{bg:'#EEEDFE',c:'#3C3489',l:'Scheduled'},installed:{bg:'#EAF3DE',c:'#085041',l:'Installed'}};
async function api(m,p,b){const r=await fetch(p,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined,credentials:'include'});return r.json();}
async function doLogin(){const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value.trim(),e=document.getElementById('le');e.classList.add('hidden');const r=await api('POST','/api/login',{username:u,password:p});if(r.error){e.classList.remove('hidden');return;}CU=r;showApp();}
async function doLogout(){await api('POST','/api/logout');CU=null;document.getElementById('app').style.display='none';document.getElementById('ls').style.display='flex';}
document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
const fmt=n=>'$'+Math.round(n).toLocaleString();
const pct=(a,b)=>b>0?Math.min(100,Math.round((a/b)*100)):0;
const ini=n=>n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
function setupTabs(tabs,def){const tw=document.getElementById('tw'),ct=document.getElementById('ct');tw.innerHTML=tabs.map(t=>`<button class="tn ${t.id===def?'active':''}" onclick="switchTab('${t.id}',this)">${t.l}</button>`).join('');ct.innerHTML=tabs.map(t=>`<div class="vw ${t.id===def?'active':''}" id="${t.id}"></div>`).join('');}
function switchTab(id,btn){document.querySelectorAll('.tn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.vw').forEach(v=>v.classList.remove('active'));btn.classList.add('active');document.getElementById(id).classList.add('active');}
function showApp(){document.getElementById('ls').style.display='none';document.getElementById('app').style.display='block';document.getElementById('un').textContent=CU.name;if(CU.role==='owner')renderOwner();else if(CU.role==='secretary')renderSecretary();else renderEmployee();}

function postHTML(p,cd){if(p.type==='quote')return`<div class="pc qt"><div class="qt-txt">"${p.body}"</div><div class="qt-au">— ${p.author}</div><div style="display:flex;justify-content:space-between;margin-top:8px;"><div style="font-size:11px;color:var(--gold);">Weekly quote · ${p.date}</div>${cd?`<button class="db" onclick="deletePost(${p.id})">×</button>`:''}</div></div>`;return`<div class="pc ${p.pin?'pn':''}"><div style="display:flex;justify-content:space-between;margin-bottom:6px;"><div style="font-size:12px;font-weight:500;">To: ${p.target}${p.pin?'<span class="bdg bp">Pinned</span>':''}</div>${cd?`<button class="db" onclick="deletePost(${p.id})">×</button>`:''}</div><div class="pb">${p.body}</div><div class="pm">${p.date}</div></div>`;}

function photoForm(ai,fi,fn,si){return`<div class="card"><div class="sl">Upload job photo</div><div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;font-weight:500;">Job address</label><input type="text" id="${ai}" placeholder="123 Main St"></div><div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;font-weight:500;">Photo</label><input type="file" id="${fi}" accept="image/*"></div><button class="btn bg" onclick="${fn}()" style="width:100%;padding:11px;border-radius:10px;font-size:14px;font-weight:600;">Upload photo</button><div id="${si}" style="font-size:13px;margin-top:8px;text-align:center;"></div></div>`;}
function photoGrid(photos,showEmp){if(!photos.length)return'<div style="text-align:center;padding:2rem;font-size:14px;color:var(--mut);">No photos yet.</div>';return`<div class="pg">${photos.map(p=>`<div class="ph-card"><img src="${p.url}" alt="Job"><div class="ph-info"><div style="font-size:13px;font-weight:500;">${p.address||'Job photo'}</div><div style="font-size:11px;color:var(--mut);margin-top:2px;">${showEmp?p.employeeName+' · ':''}${p.date}</div></div></div>`).join('')}</div>`;}
async function doUpload(ai,fi,si,cb){const addr=document.getElementById(ai).value.trim(),file=document.getElementById(fi).files[0],st=document.getElementById(si);if(!file){st.textContent='Please select a photo.';st.style.color='#E24B4A';return;}st.textContent='Uploading...';st.style.color='#888';const reader=new FileReader();reader.onload=async function(e){const r=await fetch('/api/photos',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({image:e.target.result,address:addr})});const d=await r.json();if(d.ok){st.textContent='Uploaded!';st.style.color='#085041';if(cb)cb();}else{st.textContent='Upload failed.';st.style.color='#E24B4A';}};reader.readAsDataURL(file);}

function quoteHTML(){return`<div class="card" id="qf"><div class="sl">Generate customer quote</div><div class="fr c2"><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Customer address</label><input type="text" id="qa" placeholder="123 Main St, Aberdeen SD"></div><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Building type</label><input type="text" id="qb" placeholder="Front house, wrapped around garage"></div></div><div class="fr c3"><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Footage (ft)</label><input type="number" id="qft" placeholder="170" oninput="qCalc()"></div><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Price per foot ($)</label><input type="number" id="qp" placeholder="15" oninput="qCalc()"></div><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Discount ($)</label><input type="number" id="qd" placeholder="0" oninput="qCalc()"></div></div><div style="background:var(--bg);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;gap:20px;flex-wrap:wrap;"><span style="font-size:12px;color:var(--mut);">Original: <b id="qco">$0</b></span><span style="font-size:12px;color:var(--mut);">Final: <b style="color:#1D9E75;" id="qcf">$0</b></span><span style="font-size:12px;color:var(--mut);">Discount: <b style="color:#BA7517;" id="qcd">$0</b></span></div><button onclick="qGen()" style="width:100%;padding:12px;border-radius:10px;background:var(--gd);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Generate quote</button></div><div id="qdw" style="display:none;"><div style="background:#fff;color:#1a1a1a;border-radius:14px;overflow:hidden;border:1px solid rgba(0,0,0,0.1);"><div style="background:#0a0a0a;padding:1.5rem;text-align:center;"><svg width="190" height="75" viewBox="0 0 400 140" xmlns="http://www.w3.org/2000/svg"><line x1="40" y1="80" x2="200" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/><line x1="200" y1="20" x2="360" y2="80" stroke="white" stroke-width="4" stroke-linecap="round"/><line x1="30" y1="80" x2="370" y2="80" stroke="white" stroke-width="3"/><rect x="88" y="20" width="8" height="30" fill="white"/><rect x="84" y="16" width="16" height="6" fill="white"/><circle cx="110" cy="73" r="4" fill="#EF9F27"/><circle cx="135" cy="64" r="4" fill="#EF9F27"/><circle cx="160" cy="57" r="4" fill="#EF9F27"/><circle cx="185" cy="53" r="4" fill="#EF9F27"/><circle cx="210" cy="52" r="4" fill="#EF9F27"/><circle cx="235" cy="55" r="4" fill="#EF9F27"/><circle cx="258" cy="62" r="4" fill="#EF9F27"/><circle cx="280" cy="71" r="4" fill="#EF9F27"/><text x="200" y="110" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="28" fill="white" letter-spacing="4">HEARTLAND</text><text x="200" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" letter-spacing="6">PERMANENT LIGHTING</text></svg></div><div style="background:#1D9E75;padding:8px;text-align:center;font-family:Georgia,serif;font-size:16px;color:#fff;">Custom Installation Quote</div><div style="padding:1.25rem 1.5rem;"><div style="border:1.5px solid #1a1a1a;border-radius:8px;overflow:hidden;margin-bottom:1rem;"><div style="display:grid;grid-template-columns:130px 1fr;border-bottom:1px solid #e0e0e0;font-size:13px;"><div style="padding:9px 12px;font-weight:600;background:#f5f5f5;border-right:1px solid #e0e0e0;">Address</div><div id="qra" style="padding:9px 12px;">—</div></div><div style="display:grid;grid-template-columns:130px 1fr;border-bottom:1px solid #e0e0e0;font-size:13px;"><div style="padding:9px 12px;font-weight:600;background:#f5f5f5;border-right:1px solid #e0e0e0;">Building</div><div id="qrb" style="padding:9px 12px;">—</div></div><div style="display:grid;grid-template-columns:130px 1fr;border-bottom:1px solid #e0e0e0;font-size:13px;"><div style="padding:9px 12px;font-weight:600;background:#f5f5f5;border-right:1px solid #e0e0e0;">Footage</div><div id="qrf" style="padding:9px 12px;">—</div></div><div style="display:grid;grid-template-columns:130px 1fr;font-size:13px;"><div style="padding:9px 12px;font-weight:600;background:#f5f5f5;border-right:1px solid #e0e0e0;">Price</div><div id="qrp" style="padding:9px 12px;">—</div></div></div><div style="font-size:11px;color:#444;margin-bottom:.5rem;">* Price includes materials and labor</div><div style="font-size:11px;color:#444;margin-bottom:1rem;">* Can choose white or black soffits</div><div style="font-family:Georgia,serif;font-size:15px;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #1D9E75;">What's included</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:1rem;">${['Custom measurement & layout','Professional installation','Secure outdoor mounting','App setup & walkthrough'].map(i=>`<div style="display:flex;align-items:center;gap:7px;font-size:12px;"><div style="width:14px;height:14px;background:#1D9E75;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700;flex-shrink:0;">✓</div>${i}</div>`).join('')}</div><div style="font-family:Georgia,serif;font-size:15px;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #1D9E75;">Why homeowners love it</div><ul style="list-style:none;margin-bottom:1rem;">${['Full color control from your phone','Set schedules for holidays & game days','Clean permanent install — no more hanging lights','Fun effects and music sync options','Much more affordable than premium systems'].map(i=>`<li style="font-size:12px;padding:4px 0;display:flex;gap:7px;"><div style="width:5px;height:5px;background:#1D9E75;border-radius:50%;margin-top:5px;flex-shrink:0;"></div>${i}</li>`).join('')}</ul><div style="font-family:Georgia,serif;font-size:15px;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #1D9E75;">See our work</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;"><img src="/images/IMG_8464.jpeg" style="width:100%;border-radius:8px;object-fit:cover;height:160px;"><img src="/images/IMG_8072.jpeg" style="width:100%;border-radius:8px;object-fit:cover;height:160px;"></div><div style="background:#0a0a0a;border-radius:10px;padding:1.25rem;"><div style="font-family:Georgia,serif;color:#fff;font-size:14px;margin-bottom:4px;text-align:center;">How we compare</div><div style="font-size:10px;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;" id="qrft">—</div><div id="qrcl" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;"></div><div style="height:1px;background:rgba(255,255,255,0.1);margin:8px 0;"></div><div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1D9E75;border-radius:6px;"><div style="font-size:12px;color:#fff;font-weight:600;">Heartland Permanent Lighting</div><div style="font-size:16px;font-weight:700;color:#fff;" id="qrhl">$0</div></div><div style="text-align:center;font-size:10px;color:rgba(255,255,255,0.6);margin-top:8px;" id="qrsn"></div></div></div></div><button id="qsb" onclick="qSubmit()" style="width:100%;padding:12px;border-radius:10px;background:var(--gd);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;">Submit quote to secretary</button><button onclick="qReset()" style="width:100%;padding:9px;border-radius:8px;background:transparent;color:var(--mut);border:1px solid rgba(0,0,0,0.12);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;">Generate another quote</button></div>`;}
window.qCalc=function(){const ft=parseFloat(document.getElementById('qft').value)||0,pp=parseFloat(document.getElementById('qp').value)||0,d=parseFloat(document.getElementById('qd').value)||0,o=ft*pp,f=Math.max(0,o-d);document.getElementById('qco').textContent=fmt(o);document.getElementById('qcf').textContent=fmt(f);document.getElementById('qcd').textContent=fmt(d);};

function buildCal(sales,rate,cid,showAll,emps){
  const el=document.getElementById(cid);if(!el)return;
  const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let wo=0;
  const ds=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const gw=off=>{const n=new Date(),s=new Date(n);s.setDate(n.getDate()-n.getDay()+(off*7));return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});};
  function render(){
    const dates=gw(wo),ts=ds(new Date()),sl=MN[dates[0].getMonth()]+' '+dates[0].getDate(),el2=MN[dates[6].getMonth()]+' '+dates[6].getDate()+', '+dates[6].getFullYear();
    const ws=sales.filter(s=>{const d=new Date(s.date+'T12:00:00');return dates.some(w=>ds(w)===ds(d));});
    const we=ws.reduce((sum,s)=>{if(showAll&&emps){const e=emps.find(x=>x.id===s.userId);return sum+(e?s.amount*(e.rate/100):0);}return sum+s.amount*(rate/100);},0);
    const wr=ws.reduce((sum,s)=>sum+s.amount,0);
    el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;"><button onclick="window['_c${cid}'](-1)" style="background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--txt);font-family:'DM Sans',sans-serif;">← Prev</button><div style="font-size:14px;font-weight:500;">${sl} – ${el2}</div><button onclick="window['_c${cid}'](1)" style="background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--txt);font-family:'DM Sans',sans-serif;">Next →</button></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;"><div class="mt"><div class="ml">${showAll?'Week revenue':'Week earned'}</div><div class="mv">${showAll?fmt(wr):fmt(we)}</div></div><div class="mt"><div class="ml">Jobs this week</div><div class="mv">${ws.length}</div></div><div class="mt"><div class="ml">Avg per job</div><div class="mv">${ws.length>0?fmt((showAll?wr:we)/ws.length):'$0'}</div></div></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem;">${DN.map(d=>`<div style="text-align:center;font-size:10px;font-weight:600;color:var(--mut);padding:4px 0;text-transform:uppercase;">${d}</div>`).join('')}${dates.map(d=>{const dstr=ds(d),dj=sales.filter(s=>ds(new Date(s.date+'T12:00:00'))===dstr),it=dstr===ts,hj=dj.length>0;const dots=showAll&&emps?dj.map(j=>{const e=emps.find(x=>x.id===j.userId);const c=e?EC[emps.indexOf(e)%EC.length]:'#1D9E75';return`<div style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block;margin:1px;"></div>`;}).join(''):(hj?`<div style="background:#EAF3DE;border-radius:4px;padding:2px 4px;font-size:10px;color:#085041;font-weight:600;margin-bottom:2px;">${dj.length} job${dj.length>1?'s':''}</div><div style="font-size:10px;color:#3B6D11;">${fmt(dj.reduce((s,j)=>s+j.amount*(rate/100),0))}</div>`:'');return`<div style="background:${hj?'#EAF3DE':'var(--card)'};border:${it?'1.5px solid #1D9E75':'0.5px solid rgba(0,0,0,0.08)'};border-radius:8px;padding:6px;min-height:64px;"><div style="font-size:12px;font-weight:${it?'700':'500'};color:${it?'#085041':'var(--mut)'};margin-bottom:4px;">${d.getDate()}</div>${dots}</div>`;}).join('')}</div>${ws.length>0?`<div class="card"><div class="sl">Jobs this week</div>${ws.map(s=>{const e=showAll&&emps?emps.find(x=>x.id===s.userId):null;const earned=e?s.amount*(e.rate/100):s.amount*(rate/100);const c=e?EC[emps.indexOf(e)%EC.length]:'#1D9E75';const d=new Date(s.date+'T12:00:00');return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid rgba(0,0,0,0.06);"><div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;"></div><div style="font-size:12px;color:var(--mut);width:50px;">${DN[d.getDay()]} ${d.getDate()}</div>${e?`<div style="font-size:13px;font-weight:500;flex:1;">${e.name}</div>`:`<div style="font-size:13px;flex:1;">${s.address||'—'}</div>`}<div style="font-size:13px;font-weight:600;color:#085041;">${fmt(showAll?s.amount:earned)}</div></div>`;}).join('')}</div>`:'<div style="text-align:center;font-size:13px;color:var(--mut);padding:1rem 0;">No jobs this week</div>'}`;
  }
  window[`_c${cid}`]=function(dir){wo+=dir;render();};render();
}

  document.getElementById('sl2').innerHTML=`<div class="card"><div class="sl">Log a new sale</div><div class="fr c2"><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Employee</label><select id="sse">${eo2}</select></div><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Sale amount $</label><input type="number" id="ssa" placeholder="e.g. 1400"></div></div><div class="fr c2"><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Address</label><input type="text" id="ssaddr" placeholder="123 Main St"></div></div><div class="fr c2"><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Customer name</label><input type="text" id="sscname" placeholder="John Smith"></div><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Customer phone</label><input type="tel" id="sscphone" placeholder="(605) 555-1234"></div><div><label style="font-size:12px;color:var(--mut);display:block;margin-bottom:4px;">Date</label><input type="date" id="ssd" value="${today}"></div></div><button class="btn bg" onclick="secLogSale()">Log sale</button><div id="ssc" class="hidden" style="font-size:13px;color:var(--green);margin-top:8px;font-weight:500;">Sale logged!</div></div>`;
  document.getElementById('sb').innerHTML=posts.length===0?'<div style="font-size:14px;color:var(--mut);">No posts yet.</div>':[...posts].sort((a,b)=>(b.pin?1:0)-(a.pin?1:0)).map(p=>postHTML(p,false)).join('');
  const secPhotos=await fetch('/api/photos',{credentials:'include'}).then(r=>r.json());
  document.getElementById('spg').innerHTML=photoForm('spa','spf','secUp','sps')+photoGrid(secPhotos,true);
}
window.secUp=function(){doUpload('spa','spf','sps',async()=>{const p=await fetch('/api/photos',{credentials:'include'}).then(r=>r.json());document.getElementById('spg').innerHTML=photoForm('spa','spf','secUp','sps')+photoGrid(p,true);});};

// ── ACTIONS ──
function setBT(t){document.getElementById('cm').classList.toggle('hidden',t!=='msg');document.getElementById('cq').classList.toggle('hidden',t!=='qt');document.getElementById('tbm').classList.toggle('active',t==='msg');document.getElementById('tbq').classList.toggle('active',t==='qt');}
async function postMsg(){const b=document.getElementById('pb').value.trim(),tr=document.getElementById('ptr').value.trim()||'All team',p=document.getElementById('pp').checked;if(!b)return;await api('POST','/api/posts',{type:'message',body:b,target:tr,pin:p});await refreshOwner();}
async function postQt(){const b=document.getElementById('qb2').value.trim(),a=document.getElementById('qa2').value.trim()||'Unknown';if(!b)return;await api('POST','/api/posts',{type:'quote',body:b,author:a});await refreshOwner();}
async function deletePost(id){await api('DELETE',`/api/posts/${id}`);await refreshOwner();}
async function addGoal(){const u=document.getElementById('ge').value,t=document.getElementById('gt').value,p=document.getElementById('gp').value.trim();if(!t||!p)return;await api('POST','/api/goals',{userId:u,target:t,prize:p});document.getElementById('gt').value='';document.getElementById('gp').value='';await refreshOwner();}
async function deleteGoal(id){await api('DELETE',`/api/goals/${id}`);await refreshOwner();}
async function logSale(){const u=document.getElementById('se').value,a=document.getElementById('sa').value,addr=document.getElementById('saddr').value,d=document.getElementById('sd').value,cn=document.getElementById('scname').value,cp=document.getElementById('scphone').value;if(!a)return;await api('POST','/api/sales',{userId:u,amount:a,address:addr,date:d,customerName:cn,customerPhone:cp});document.getElementById('sa').value='';document.getElementById('saddr').value='';const c=document.getElementById('sc');c.classList.remove('hidden');setTimeout(()=>c.classList.add('hidden'),3000);await refreshOwner();}
async function logMySale(){const a=document.getElementById('msa').value,addr=document.getElementById('msaddr').value,d=document.getElementById('msd').value,cn=document.getElementById('mscname').value,cp=document.getElementById('mscphone').value;if(!a)return;await api('POST','/api/sales',{amount:a,address:addr,date:d,customerName:cn,customerPhone:cp});document.getElementById('msa').value='';document.getElementById('msaddr').value='';const c=document.getElementById('msc');c.classList.remove('hidden');setTimeout(()=>c.classList.add('hidden'),3000);await refreshOwner();}
async function secLogSale(){const u=document.getElementById('sse').value,a=document.getElementById('ssa').value,addr=document.getElementById('ssaddr').value,d=document.getElementById('ssd').value,cn=document.getElementById('sscname').value,cp=document.getElementById('sscphone').value;if(!a)return;await api('POST','/api/sales',{userId:u,amount:a,address:addr,date:d,customerName:cn,customerPhone:cp});document.getElementById('ssa').value='';document.getElementById('ssaddr').value='';const c=document.getElementById('ssc');c.classList.remove('hidden');setTimeout(()=>c.classList.add('hidden'),3000);await renderSecretary();}
async function deleteSale(id){if(!confirm('Delete this sale?'))return;await api('DELETE','/api/sales/'+id);await refreshOwner();}
async function secDeleteSale(id){if(!confirm('Delete this sale?'))return;await api('DELETE','/api/sales/'+id);await renderSecretary();}
async function togglePaid(id,paid){await api('PATCH',`/api/sales/${id}/paid`,{paid});await refreshOwner();}
async function secPaid(id,paid){await api('PATCH',`/api/sales/${id}/paid`,{paid});await renderSecretary();}
async function addEmployee(){const n=document.getElementById('mn').value.trim(),u=document.getElementById('mu').value.trim(),p=document.getElementById('mp').value.trim(),r=document.getElementById('mr').value;if(!n||!u||!p){alert('Please fill in all fields.');return;}const res=await api('POST','/api/employees',{name:n,username:u,password:p,rate:r});if(res.error){alert('Error: '+res.error);return;}document.getElementById('mn').value='';document.getElementById('mu').value='';document.getElementById('mp').value='';document.getElementById('mr').value='';const c=document.getElementById('mc');c.classList.remove('hidden');setTimeout(()=>c.classList.add('hidden'),3000);await refreshOwner();}
async function updateRate(id){await api('PATCH',`/api/employees/${id}`,{rate:document.getElementById(`rt${id}`).value});await refreshOwner();}
async function updatePw(id){const p=document.getElementById(`pw${id}`).value;if(!p)return;await api('PATCH',`/api/employees/${id}`,{password:p});document.getElementById(`pw${id}`).value='';alert('Password updated!');}
(async()=>{try{const me=await api('GET','/api/me');if(me&&me.role){CU=me;showApp();}}catch{}})();
</script>
