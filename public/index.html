<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartland Permanent Lighting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--green:#1D9E75;--green-light:#EAF3DE;--green-dark:#085041;--gold:#BA7517;--gold-light:#FAEEDA;--gold-dark:#633806;--purple:#534AB7;--purple-light:#EEEDFE;--bg:#F8F7F4;--card:#FFFFFF;--border:rgba(0,0,0,0.08);--text:#1a1a1a;--muted:#888;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hidden{display:none!important;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.login-card{background:var(--card);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;border:1px solid var(--border);}
.login-logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--green-dark);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:2rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.field input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;}
.field input:focus{border-color:var(--green);}
.login-btn{width:100%;padding:13px;border-radius:10px;background:var(--green-dark);color:#fff;border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.login-btn:hover{background:var(--green);}
.login-err{font-size:13px;color:#E24B4A;margin-top:10px;text-align:center;}
#app{display:none;min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10;}
.topbar-logo{font-family:'DM Serif Display',serif;font-size:17px;color:var(--green-dark);}
.logout-btn{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.logout-btn:hover{background:var(--bg);}
.tabs-wrap{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.25rem;overflow-x:auto;white-space:nowrap;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab-btn{display:inline-block;padding:14px 16px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;}
.tab-btn.active{color:var(--green-dark);border-bottom-color:var(--green-dark);}
.content{padding:1.25rem;max-width:780px;margin:0 auto;}
.view{display:none;}
.view.active{display:block;}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:1rem;}
.section-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
.earned-hero{background:var(--green-light);border-radius:var(--radius);padding:1.5rem;text-align:center;margin-bottom:1rem;}
.earned-label{font-size:13px;font-weight:500;color:var(--green);margin-bottom:6px;}
.earned-amount{font-family:'DM Serif Display',serif;font-size:52px;color:var(--green-dark);line-height:1;}
.earned-sub{font-size:13px;color:var(--green);margin-top:8px;}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem;}
.metric{background:var(--bg);border-radius:10px;padding:.875rem 1rem;}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;}
.metric-value{font-size:22px;font-weight:600;color:var(--text);}
.metric-3{grid-template-columns:repeat(3,1fr);}
.owner-hero{background:var(--green-light);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.owner-hero-amount{font-family:'DM Serif Display',serif;font-size:36px;color:var(--green-dark);}
.emp-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.emp-item:last-child{border-bottom:none;}
.emp-name{font-size:14px;font-weight:500;}
.emp-sub{font-size:12px;color:var(--muted);}
.emp-earned-amount{font-size:16px;font-weight:600;color:var(--green-dark);}
.emp-earned-rev{font-size:11px;color:var(--muted);}
.prog-track{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;border-radius:99px;background:var(--green);transition:width .3s;}
.prog-fill.blue{background:#378ADD;}
.form-row{display:grid;gap:8px;margin-bottom:10px;}
.form-row.cols2{grid-template-columns:1fr 1fr;}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr;}
.form-row.cols4{grid-template-columns:1fr 1fr 1fr auto;}
input,select,textarea{padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);width:100%;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--green);}
textarea{resize:vertical;min-height:80px;}
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn-green{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}
.btn-green:hover{background:var(--green);border-color:var(--green);}
.btn-sm{padding:6px 12px;font-size:13px;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:0 4px;}
.del-btn:hover{color:#E24B4A;}
.post-card{border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px;border:1px solid var(--border);background:var(--card);}
.post-card.quote{background:var(--gold-light);border-color:var(--gold);border-left:3px solid var(--gold);border-radius:0 var(--radius) var(--radius) 0;}
.post-card.pinned{border-left:3px solid var(--purple);border-radius:0 var(--radius) var(--radius) 0;}
.quote-text{font-family:'DM Serif Display',serif;font-size:17px;color:var(--gold-dark);line-height:1.5;margin-bottom:6px;font-style:italic;}
.quote-author{font-size:12px;color:var(--gold);font-weight:500;}
.post-body{font-size:14px;line-height:1.6;margin-bottom:6px;}
.post-meta{font-size:11px;color:var(--muted);}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:6px;vertical-align:middle;}
.badge-pin{background:var(--purple-light);color:var(--purple);}
.badge-goal{background:var(--gold-light);color:var(--gold-dark);}
.badge-achieved{background:var(--green-light);color:var(--green-dark);}
.goal-card{border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:10px;background:var(--card);}
.goal-card.achieved{border-color:var(--green);background:var(--green-light);}
.sales-table{width:100%;font-size:13px;border-collapse:collapse;}
.sales-table th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--border);}
.sales-table td{padding:10px 8px;border-bottom:1px solid var(--border);}
.sales-table tr:last-child td{border-bottom:none;}
.type-toggle{display:flex;gap:6px;margin-bottom:12px;}
.type-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;}
.type-btn.active{background:var(--green-light);color:var(--green-dark);border-color:var(--green);}
.type-btn.quote-t.active{background:var(--gold-light);color:var(--gold-dark);border-color:var(--gold);}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.photo-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.photo-card img{width:100%;height:160px;object-fit:cover;display:block;}
.photo-info{padding:10px 12px;}
@media(max-width:480px){.form-row.cols3,.form-row.cols4{grid-template-columns:1fr 1fr;}.owner-hero{flex-direction:column;gap:8px;text-align:center;}.metric-3{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="login-screen">
<div class="login-card">
<div class="login-logo">Heartland Permanent Lighting</div>
<div class="login-sub">Sign in to your dashboard</div>
<div class="field"><label>Username</label><input type="text" id="l-user" placeholder="Enter username" autocomplete="username"></div>
<div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="Enter password" autocomplete="current-password"></div>
<button class="login-btn" onclick="doLogin()">Sign in</button>
<div class="login-err hidden" id="l-err">Invalid username or password</div>
</div>
</div>
<div id="app">
<div class="topbar">
<div class="topbar-logo">Heartland</div>
<div style="display:flex;align-items:center;gap:12px;">
<span style="font-size:13px;color:var(--muted);" id="topbar-name"></span>
<button class="logout-btn" onclick="doLogout()">Sign out</button>
</div>
</div>
<div class="tabs-wrap" id="tabs-wrap"></div>
<div class="content" id="content"></div>
</div>
<script>
let currentUser=null;
const EMP_COLORS=['#1D9E75','#378ADD','#534AB7','#BA7517','#D85A30','#D4537E','#639922','#888780','#E24B4A'];
const STATUS_COLORS={new:{bg:'#FAEEDA',color:'#633806',label:'New'},ordered:{bg:'#E6F1FB',color:'#0C447C',label:'Lights ordered'},scheduled:{bg:'#EEEDFE',color:'#3C3489',label:'Scheduled'},installed:{bg:'#EAF3DE',color:'#085041',label:'Installed'}};
async function api(method,path,body){const res=await fetch(path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined,credentials:'include'});return res.json();}
async function doLogin(){const username=document.getElementById('l-user').value.trim();const password=document.getElementById('l-pass').value.trim();const err=document.getElementById('l-err');err.classList.add('hidden');const res=await api('POST','/api/login',{username,password});if(res.error){err.classList.remove('hidden');return;}currentUser=res;showApp();}
async function doLogout(){await api('POST','/api/logout');currentUser=null;document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';}
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function fmt(n){return'$'+Math.round(n).toLocaleString();}
function pct(a,b){return b>0?Math.min(100,Math.round((a/b)*100)):0;}
function ini(name){return name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function setupTabs(tabs,def){const wrap=document.getElementById('tabs-wrap');const content=document.getElementById('content');wrap.innerHTML=tabs.map(t=>`<button class="tab-btn ${t.id===def?'active':''}" onclick="switchTab('${t.id}',this)">${t.label}</button>`).join('');content.innerHTML=tabs.map(t=>`<div class="view ${t.id===def?'active':''}" id="${t.id}"></div>`).join('');}
function switchTab(id,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));btn.classList.add('active');document.getElementById(id).classList.add('active');}
function postHTML(p,canDelete){if(p.type==='quote'){return`<div class="post-card quote"><div class="quote-text">"${p.body}"</div><div class="quote-author">— ${p.author}</div><div style="display:flex;justify-content:space-between;margin-top:8px;"><div style="font-size:11px;color:var(--gold);">Weekly quote · ${p.date}</div>${canDelete?`<button class="del-btn" onclick="deletePost(${p.id})">×</button>`:''}</div></div>`;}return`<div class="post-card ${p.pin?'pinned':''}"><div style="display:flex;justify-content:space-between;margin-bottom:6px;"><div style="font-size:12px;font-weight:500;">To: ${p.target}${p.pin?'<span class="badge badge-pin">Pinned</span>':''}</div>${canDelete?`<button class="del-btn" onclick="deletePost(${p.id})">×</button>`:''}</div><div class="post-body">${p.body}</div><div class="post-meta">${p.date}</div></div>`;}
function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';document.getElementById('topbar-name').textContent=currentUser.name;if(currentUser.role==='owner')renderOwnerApp();else if(currentUser.role==='secretary')renderSecretaryApp();else renderEmployeeApp();}

// ── CALENDAR ──
function buildCalendar(sales,rate,cid,showAll,employees){
  const el=document.getElementById(cid);if(!el)return;
  const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let wo=0;
  function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function getWeek(off){const now=new Date(),s=new Date(now);s.setDate(now.getDate()-now.getDay()+(off*7));return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});}
  function render(){
    const dates=getWeek(wo),ts=ds(new Date());
    const sl=MN[dates[0].getMonth()]+' '+dates[0].getDate(),el2=MN[dates[6].getMonth()]+' '+dates[6].getDate()+', '+dates[6].getFullYear();
    const ws=sales.filter(s=>{const d=new Date(s.date+'T12:00:00');return dates.some(w=>ds(w)===ds(d));});
    const we=ws.reduce((sum,s)=>{if(showAll&&employees){const emp=employees.find(e=>e.id===s.userId);return sum+(emp?s.amount*(emp.rate/100):0);}return sum+s.amount*(rate/100);},0);
    const wr=ws.reduce((sum,s)=>sum+s.amount,0);
    el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;"><button onclick="window['_c_${cid}'](-1)" style="background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;">← Prev</button><div style="font-size:14px;font-weight:500;">${sl} – ${el2}</div><button onclick="window['_c_${cid}'](1)" style="background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;">Next →</button></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;"><div class="metric"><div class="metric-label">${showAll?'Week revenue':'Week earned'}</div><div class="metric-value">${showAll?fmt(wr):fmt(we)}</div></div><div class="metric"><div class="metric-label">Jobs this week</div><div class="metric-value">${ws.length}</div></div><div class="metric"><div class="metric-label">Avg per job</div><div class="metric-value">${ws.length>0?fmt((showAll?wr:we)/ws.length):'$0'}</div></div></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem;">${DN.map(d=>`<div style="text-align:center;font-size:10px;font-weight:600;color:var(--muted);padding:4px 0;text-transform:uppercase;">${d}</div>`).join('')}${dates.map(d=>{const dayStr=ds(d),dj=sales.filter(s=>ds(new Date(s.date+'T12:00:00'))===dayStr),it=dayStr===ts,hj=dj.length>0;const dots=showAll&&employees?dj.map(j=>{const emp=employees.find(e=>e.id===j.userId);const c=emp?EMP_COLORS[employees.indexOf(emp)%EMP_COLORS.length]:'#1D9E75';return`<div style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block;margin:1px;"></div>`;}).join(''):(hj?`<div style="background:#EAF3DE;border-radius:4px;padding:2px 4px;font-size:10px;color:#085041;font-weight:600;margin-bottom:2px;">${dj.length} job${dj.length>1?'s':''}</div><div style="font-size:10px;color:#3B6D11;">${fmt(dj.reduce((s,j)=>s+j.amount*(rate/100),0))}</div>`:'');return`<div style="background:${hj?'#EAF3DE':'var(--card)'};border:${it?'1.5px solid #1D9E75':'0.5px solid rgba(0,0,0,0.08)'};border-radius:8px;padding:6px;min-height:64px;"><div style="font-size:12px;font-weight:${it?'700':'500'};color:${it?'#085041':'var(--muted)'};margin-bottom:4px;">${d.getDate()}</div>${dots}</div>`;}).join('')}</div>${ws.length>0?`<div class="card"><div class="section-label">Jobs this week</div>${ws.map(s=>{const emp=showAll&&employees?employees.find(e=>e.id===s.userId):null;const earned=emp?s.amount*(emp.rate/100):s.amount*(rate/100);const c=emp?EMP_COLORS[employees.indexOf(emp)%EMP_COLORS.length]:'#1D9E75';const d=new Date(s.date+'T12:00:00');return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid rgba(0,0,0,0.06);"><div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;"></div><div style="font-size:12px;color:var(--muted);width:50px;">${DN[d.getDay()]} ${d.getDate()}</div>${emp?`<div style="font-size:13px;font-weight:500;flex:1;">${emp.name}</div>`:`<div style="font-size:13px;flex:1;">${s.address||'—'}</div>`}<div style="font-size:13px;font-weight:600;color:#085041;">${fmt(showAll?s.amount:earned)}</div></div>`;}).join('')}</div>`:'<div style="text-align:center;font-size:13px;color:var(--muted);padding:1rem 0;">No jobs this week</div>'}`;
  }
  window[`_c_${cid}`]=function(dir){wo+=dir;render();};render();
}

// ── PHOTO GALLERY ──
function photoUploadForm(addrId,fileId,btnFn,statusId){
  return `<div class="card"><div class="section-label">Upload job photo</div><div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;font-weight:500;">Job address</label><input type="text" id="${addrId}" placeholder="123 Main St" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:'DM Sans',sans-serif;"></div><div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;font-weight:500;">Photo</label><input type="file" id="${fileId}" accept="image/*" style="width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;"></div><button onclick="${btnFn}()" style="width:100%;padding:11px;border-radius:10px;background:var(--green-dark);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Upload photo</button><div id="${statusId}" style="font-size:13px;margin-top:8px;text-align:center;"></div></div>`;
}
function photoGrid(photos,showEmployee){
  if(!photos.length)return'<div style="text-align:center;padding:2rem;font-size:14px;color:var(--muted);">No photos yet.</div>';
  return`<div class="photo-grid">${photos.map(p=>`<div class="photo-card"><img src="${p.url}" alt="Job photo"><div class="photo-info"><div style="font-size:13px;font-weight:500;">${p.address||'Job photo'}</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">${showEmployee?p.employeeName+' · ':''}${p.date}</div></div></div>`).join('')}</div>`;
}
async function doUpload(addrId,fileId,statusId,cb){
  const addr=document.getElementById(addrId).value.trim();
  const file=document.getElementById(fileId).files[0];
  const status=document.getElementById(statusId);
  if(!file){status.textContent='Please select a photo.';status.style.color='#E24B4A';return;}
  status.textContent='Uploading...';status.style.color='#888';
  const reader=new FileReader();
  reader.onload=async function(e){
    const res=await fetch('/api/photos',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({image:e.target.result,address:addr})});
    const data=await res.json();
    if(data.ok){status.textContent='Uploaded!';status.style.color='#085041';if(cb)cb();}
    else{status.textContent='Upload failed.';status.style.color='#E24B4A';}
  };
  reader.readAsDataURL(file);
}

// ── QUOTE GENERATOR ──

bject-fit:cover;height:160px;"></div><div style="background:#0a0a0a;border-radius:10px;padding:1.25rem;"><div style="font-family:Georgia,serif;color:#fff;font-size:14px;margin-bottom:4px;text-align:center;">How we compare to competitors</div><div style="font-size:10px;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;" id="qr-comp-ft">Based on — ft</div><div id="qr-comp-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;"></div><div style="height:1px;background:rgba(255,255,255,0.1);margin:8px 0;"></div><div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1D9E75;border-radius:6px;"><div style="font-size:12px;color:#fff;font-weight:600;">Heartland Permanent Lighting</div><div style="font-size:16px;font-weight:700;color:#fff;" id="qr-hl-price">$0</div></div><div style="text-align:center;font-size:10px;color:rgba(255,255,255,0.6);margin-top:8px;" id="qr-save-note"></div></div></div></div><button id="q-submit-btn" onclick="qSubmit()" style="width:100%;padding:12px;border-radius:10px;background:#085041;color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;">Submit quote to secretary</button><button onclick="qReset()" style="width:100%;padding:9px;border-radius:8px;background:transparent;color:var(--muted);border:1px solid rgba(0,0,0,0.12);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;">Generate another quote</button></div>`;}
window.qCalc=function(){const ft=parseFloat(document.getElementById('qa-ft').value)||0,ppf=parseFloat(document.getElementById('qa-ppf').value)||0,disc=parseFloat(document.getElementById('qa-disc').value)||0,orig=ft*ppf,final=Math.max(0,orig-disc);document.getElementById('qc-orig').textContent=fmt(orig);document.getElementById('qc-final').textContent=fmt(final);document.getElementById('qc-disc').textContent=fmt(disc);};
window.qGenerate=function(){const addr=document.getElementById('qa-addr').value.trim(),bld=document.getElementById('qa-bld').value.trim(),ft=parseFloat(document.getElementById('qa-ft').value)||0,ppf=parseFloat(document.getElementById('qa-ppf').value)||0,disc=parseFloat(document.getElementById('qa-disc').value)||0;if(!addr||!ft||!ppf){alert('Please fill in address, footage, and price per foot.');return;}const orig=ft*ppf,final=Math.max(0,orig-disc);document.getElementById('qr-addr').textContent=addr;document.getElementById('qr-bld').textContent=bld||'Residential';document.getElementById('qr-ft').textContent=ft+' ft';document.getElementById('qr-price').innerHTML=disc>0?`<span style="color:#999;text-decoration:line-through;margin-right:5px;">${fmt(orig)}</span> → <span style="color:#085041;font-weight:700;">${fmt(final)}</span>`:`<span style="color:#085041;font-weight:700;">${fmt(final)}</span>`;document.getElementById('qr-comp-ft').textContent='Based on '+ft+' ft installation';document.getElementById('qr-hl-price').textContent=fmt(final);const comps=[{name:'Trimlight System',low:18,high:35},{name:'JellyFish Lighting',low:25,high:35},{name:'Astoria Lighting Co.',low:20,high:28},{name:'Leading Edge / Small installers',low:17,high:22}];document.getElementById('qr-comp-list').innerHTML=comps.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:rgba(255,255,255,0.05);border-radius:6px;"><div style="font-size:11px;color:rgba(255,255,255,0.7);">${c.name}</div><div style="font-size:12px;font-weight:600;color:#EF9F27;">${fmt(Math.round(c.low*ft))} – ${fmt(Math.round(c.high*ft))}</div></div>`).join('');const savings=Math.round(17*ft)-final;document.getElementById('qr-save-note').textContent=savings>0?'Save up to '+fmt(savings)+' compared to competitors':'Professional installation at an unbeatable price';document.getElementById('qform').style.display='none';document.getElementById('qdoc-wrap').style.display='block';};
window.qReset=function(){document.getElementById('qform').style.display='block';document.getElementById('qdoc-wrap').style.display='none';};
window.qSubmit=async function(){const addr=document.getElementById('qa-addr').value.trim(),bld=document.getElementById('qa-bld').value.trim(),ft=parseFloat(document.getElementById('qa-ft').value)||0,ppf=parseFloat(document.getElementById('qa-ppf').value)||0,disc=parseFloat(document.getElementById('qa-disc').value)||0,final=Math.max(0,ft*ppf-disc);const btn=document.getElementById('q-submit-btn');await api('POST','/api/quotes',{address:addr,building:bld,footage:ft,price:ppf,discount:disc,finalPrice:final});btn.textContent='Submitted!';btn.style.background='#1D9E75';setTimeout(()=>{btn.textContent='Submit quote to secretary';btn.style.background='#085041';},3000);};

  const nq=quotes.filter(q=>q.status==='new'),oq=quotes.filter(q=>q.status!=='new');
  document.getElementById('sec-quotes').innerHTML=quotes.length===0?'<div style="font-size:14px;color:var(--muted);">No quotes yet.</div>':`${nq.length>0?`<div class="section-label">New (${nq.length})</div>${nq.map(sqc).join('')}`:''}${oq.length>0?`<div class="section-label" style="margin-top:12px;">In progress / completed</div>${oq.map(sqc).join('')}`:''}`;

  document.getElementById('sec-payments').innerHTML=allSales.length===0?'<div style="font-size:14px;color:var(--muted);">No sales yet.</div>':`<div class="card">${allSales.map(s=>{const emp=employees.find(e=>e.id===s.userId);if(!emp)return'';const comm=s.amount*(emp.rate/100);return`<div style="display:grid;grid-template-columns:1fr 70px 70px 90px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);${s.paid?'opacity:0.5':''}"><div><div style="font-size:13px;font-weight:500;">${emp.name}</div><div style="font-size:11px;color:var(--muted);">${s.address||s.date}</div></div><div style="font-size:13px;">${fmt(s.amount)}</div><div style="font-size:13px;color:var(--green-dark);font-weight:500;">${fmt(comm)}</div><button onclick="secTogglePaid(${s.id},${!s.paid})" style="padding:5px 10px;border-radius:6px;border:1px solid;font-size:11px;font-weight:500;cursor:pointer;background:${s.paid?'transparent':'#085041'};color:${s.paid?'#888':'#fff'};border-color:${s.paid?'rgba(0,0,0,0.12)':'#085041'};">${s.paid?'Paid':'Mark paid'}</button></div>`;}).join('')}</div>`;

  document.getElementById('sec-board').innerHTML=posts.length===0?'<div style="font-size:14px;color:var(--muted);">No posts yet.</div>':[...posts].sort((a,b)=>(b.pin?1:0)-(a.pin?1:0)).map(p=>postHTML(p,false)).join('');

  const secPhotos=await fetch('/api/photos',{credentials:'include'}).then(r=>r.json());
  document.getElementById('sec-gallery').innerHTML=photoUploadForm('sec-photo-addr','sec-photo-file','secUpload','sec-upload-status')+photoGrid(secPhotos,true);
}
window.secUpload=function(){doUpload('sec-photo-addr','sec-photo-file','sec-upload-status',async()=>{const photos=await fetch('/api/photos',{credentials:'include'}).then(r=>r.json());document.getElementById('sec-gallery').innerHTML=photoUploadForm('sec-photo-addr','sec-photo-file','secUpload','sec-upload-status')+photoGrid(photos,true);});};

// ── ACTIONS ──
function setBoardType(t){document.getElementById('compose-msg').classList.toggle('hidden',t!=='msg');document.getElementById('compose-quote').classList.toggle('hidden',t!=='quote');document.getElementById('tb-msg').classList.toggle('active',t==='msg');document.getElementById('tb-quote').classList.toggle('active',t==='quote');}
async function postMessage(){const body=document.getElementById('p-body').value.trim(),target=document.getElementById('p-target').value.trim()||'All team',pin=document.getElementById('p-pin').checked;if(!body)return;await api('POST','/api/posts',{type:'message',body,target,pin});await refreshOwner();}
async function postQuote(){const body=document.getElementById('q-body').value.trim(),author=document.getElementById('q-author').value.trim()||'Unknown';if(!body)return;await api('POST','/api/posts',{type:'quote',body,author});await refreshOwner();}
async function deletePost(id){await api('DELETE',`/api/posts/${id}`);await refreshOwner();}
async function addGoal(){const userId=document.getElementById('g-emp').value,target=document.getElementById('g-target').value,prize=document.getElementById('g-prize').value.trim();if(!target||!prize)return;await api('POST','/api/goals',{userId,target,prize});document.getElementById('g-target').value='';document.getElementById('g-prize').value='';await refreshOwner();}
async function deleteGoal(id){await api('DELETE',`/api/goals/${id}`);await refreshOwner();}
async function logSale(){const userId=document.getElementById('s-emp').value,amount=document.getElementById('s-amount').value,address=document.getElementById('s-address').value,date=document.getElementById('s-date').value;if(!amount)return;await api('POST','/api/sales',{userId,amount,address,date});document.getElementById('s-amount').value='';document.getElementById('s-address').value='';const c=document.getElementById('s-confirm');c.classList.remove('hidden');setTimeout(()=>c.classList.add('hidden'),3000);await refreshOwner();}
async function saveOwnerSales(){await api('POST','/api/owner-sales',{revenue:document.getElementById('o-rev').value,installs:document.getElementById('o-inst').value});await refreshOwner();}
async function addEmployee(){const name=document.getElementById('m-name').value.trim(),username=document.getElementById('m-user').value.trim(),password=document.getElementById('m-pass').value.trim(),rate=document.getElementById('m-rate').value;if(!name||!username||!password)return;await api('POST','/api/employees',{name,username,password,rate});document.getElementById('m-name').value='';document.getElementById('m-user').value='';document.getElementById('m-pass').value='';document.getElementById('m-rate').value='';const c=document.getElementById('m-confirm');c.classList.remove('hidden');setTimeout(()=>c.classList.add('hidden'),3000);await refreshOwner();}
async function updateRate(id){await api('PATCH',`/api/employees/${id}`,{rate:document.getElementById(`rate-${id}`).value});await refreshOwner();}
async function updatePassword(id){const pw=document.getElementById(`pw-${id}`).value;if(!pw)return;await api('PATCH',`/api/employees/${id}`,{password:pw});document.getElementById(`pw-${id}`).value='';alert('Password updated!');}
async function togglePaid(id,paid){await api('PATCH',`/api/sales/${id}/paid`,{paid});await refreshOwner();}
async function secTogglePaid(id,paid){await api('PATCH',`/api/sales/${id}/paid`,{paid});await renderSecretaryApp();}
(async()=>{try{const me=await api('GET','/api/me');if(me&&me.role){currentUser=me;showApp();}}catch{}})();
</script>
</body>
</html>
